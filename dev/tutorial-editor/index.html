<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BOKS Tutorial Editor</title>
  <style>
    :root {
      --bg: #e9edf2;
      --panel: #f8f7f2;
      --panel-2: #ffffff;
      --edge: #cdd4dc;
      --ink: #1f2933;
      --muted: #66717d;
      --soft: #eef1f4;
      --focus: #235f8f;
      --shadow: rgba(31, 41, 51, 0.12);
      --narration: #2f8d62;
      --pause: #8a6f2e;
      --spawn: #2d7fc2;
      --hide: #697386;
      --highlight: #d49a20;
      --lock: #b84b43;
      --unlock: #7d62b8;
      --wait: #2f8290;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      color: var(--ink);
      background:
        linear-gradient(180deg, #f3f5f7 0%, var(--bg) 100%);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid rgba(31, 41, 51, 0.16);
      border-radius: 8px;
      padding: 7px 10px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    button.primary {
      background: var(--focus);
      color: #fff;
      border-color: var(--focus);
    }

    button.icon {
      width: 34px;
      padding: 0;
      display: grid;
      place-items: center;
    }

    button:disabled {
      opacity: 0.42;
      cursor: default;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid rgba(31, 41, 51, 0.18);
      border-radius: 8px;
      padding: 8px 9px;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      min-height: 112px;
      resize: vertical;
      line-height: 1.35;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 700;
    }

    .app {
      height: 100vh;
      padding: 12px;
      display: grid;
      grid-template-columns: 260px minmax(430px, 1fr) 360px;
      gap: 12px;
    }

    .column {
      min-height: 0;
      border: 1px solid var(--edge);
      border-radius: 10px;
      background: var(--panel);
      box-shadow: 0 14px 28px var(--shadow);
      overflow: hidden;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .column-header {
      min-height: 58px;
      padding: 12px;
      border-bottom: 1px solid var(--edge);
      background: rgba(255,255,255,0.72);
      display: grid;
      gap: 3px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 1.08rem;
    }

    h2 {
      font-size: 0.96rem;
    }

    .hint,
    .status {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.32;
    }

    .palette-body {
      min-height: 0;
      padding: 12px;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 12px;
    }

    .palette-list {
      display: grid;
      align-content: start;
      gap: 9px;
    }

    .palette-block {
      min-height: 48px;
      border: 1px solid rgba(31, 41, 51, 0.14);
      border-left: 8px solid var(--beat-color);
      border-radius: 9px;
      padding: 8px 10px;
      background: var(--panel-2);
      cursor: grab;
      display: grid;
      gap: 2px;
    }

    .palette-block:active {
      cursor: grabbing;
    }

    .palette-block strong {
      font-size: 0.88rem;
    }

    .palette-block span {
      color: var(--muted);
      font-size: 0.74rem;
    }

    .timeline {
      min-height: 0;
      grid-template-rows: auto auto 1fr;
    }

    .tabs {
      min-width: 0;
      min-height: 46px;
      padding: 8px;
      border-bottom: 1px solid var(--edge);
      background: #eef2f5;
      display: flex;
      gap: 6px;
      overflow-x: auto;
    }

    .tab {
      min-width: 108px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: #fff;
    }

    .tab.active {
      color: #fff;
      background: var(--focus);
      border-color: var(--focus);
    }

    .timeline-toolbar {
      padding: 8px 10px;
      border-bottom: 1px solid var(--edge);
      background: rgba(255,255,255,0.64);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .toolbar-group {
      display: flex;
      flex: 1;
      align-items: center;
      gap: 6px;
    }

    #previewBtn {
      flex: 1;
      min-width: 180px;
    }

    .duration {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .beat-list {
      min-height: 0;
      padding: 10px;
      overflow-y: auto;
      display: grid;
      align-content: start;
      gap: 8px;
    }

    .beat-card {
      min-height: 54px;
      border: 1px solid rgba(31, 41, 51, 0.14);
      border-radius: 9px;
      background: #fff;
      display: grid;
      grid-template-columns: 24px 16px 1fr 34px;
      align-items: center;
      gap: 8px;
      padding: 8px;
    }

    .drag-handle {
      width: 24px;
      height: 34px;
      border-radius: 7px;
      color: #8a949f;
      cursor: grab;
      display: grid;
      place-items: center;
      font-size: 1.08rem;
      line-height: 1;
      user-select: none;
    }

    .drag-handle:active {
      cursor: grabbing;
      background: var(--soft);
    }

    .beat-card.active {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(35, 95, 143, 0.13);
    }

    .beat-card.dragging {
      opacity: 0.45;
    }

    .beat-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--beat-color);
    }

    .beat-main {
      min-width: 0;
      display: grid;
      gap: 3px;
    }

    .beat-title {
      font-size: 0.86rem;
      font-weight: 800;
    }

    .beat-preview {
      overflow: hidden;
      color: var(--muted);
      font-size: 0.78rem;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .drop-zone {
      min-height: 62px;
      border: 2px dashed rgba(31, 41, 51, 0.2);
      border-radius: 10px;
      color: var(--muted);
      background: rgba(255,255,255,0.48);
      display: grid;
      place-items: center;
      font-size: 0.86rem;
      font-weight: 700;
    }

    .drop-zone.over,
    .beat-card.over {
      border-color: var(--focus);
      background: #eef7ff;
    }

    .inspector-body {
      min-height: 0;
      overflow-y: auto;
      padding: 12px;
      display: grid;
      align-content: start;
      gap: 12px;
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.35;
      padding: 12px;
      border-radius: 9px;
      background: rgba(255,255,255,0.54);
    }

    .tag-picker {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .tag {
      min-height: 32px;
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      border: 1px solid rgba(31, 41, 51, 0.16);
    }

    .tag.active {
      background: var(--unlock);
      border-color: var(--unlock);
      color: #fff;
    }

    .audio-box {
      border: 1px solid rgba(31, 41, 51, 0.14);
      border-radius: 9px;
      background: rgba(255,255,255,0.56);
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .audio-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .audio-warning {
      color: #a93932;
      font-size: 0.8rem;
      display: none;
      align-items: center;
      gap: 6px;
    }

    .audio-warning.show {
      display: flex;
    }

    .audio-warning::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #c94038;
      display: inline-block;
    }

    @media (max-width: 1100px) {
      body {
        overflow: auto;
      }

      .app {
        height: auto;
        min-height: 100vh;
        grid-template-columns: 1fr;
      }

      .column {
        min-height: 520px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="column">
      <div class="column-header">
        <h1>Tutorial Editor</h1>
        <p class="hint">Drag a block into the timeline.</p>
      </div>
      <div class="palette-body">
        <div id="palette" class="palette-list"></div>
        <div>
          <p id="draftStatus" class="status"></p>
          <button id="saveDraftBtn" type="button">Save editor draft now</button>
          <button id="exportBtn" class="primary" type="button">Export tutorial data</button>
          <p id="exportStatus" class="status"></p>
        </div>
      </div>
    </aside>

    <section class="column timeline">
      <div id="sequenceTabs" class="tabs"></div>
      <div class="timeline-toolbar">
        <div class="toolbar-group">
          <button id="previewBtn" class="primary" type="button">Preview current sequence</button>
          <button id="previewAllBtn" type="button">Preview full tutorial</button>
          <button id="duplicateBtn" type="button">Duplicate beat</button>
          <button id="deleteSelectedBtn" type="button">Delete beat</button>
        </div>
        <span id="durationLabel" class="duration">0 ms</span>
      </div>
      <div id="beatList" class="beat-list"></div>
    </section>

    <aside class="column">
      <div class="column-header">
        <h2>Inspector</h2>
        <p id="selectedSummary" class="hint">No beat selected.</p>
      </div>
      <div id="inspector" class="inspector-body"></div>
    </aside>
  </main>

  <script>
    const BEAT_TYPES = [
      { type: 'Narration', color: 'var(--narration)', hint: 'Caption and optional audio.' },
      { type: 'Pause', color: 'var(--pause)', hint: 'Wait for a fixed duration.' },
      { type: 'Spawn', color: 'var(--spawn)', hint: 'Bring an element on stage.' },
      { type: 'Hide', color: 'var(--hide)', hint: 'Remove an element from stage.' },
      { type: 'Highlight', color: 'var(--highlight)', hint: 'Guide attention to an element.' },
      { type: 'Clear highlight', color: 'var(--highlight)', hint: 'Stop the current highlight.' },
      { type: 'Hand hint', color: 'var(--wait)', hint: 'Show an animated gesture hint.' },
      { type: 'Clear hand hint', color: 'var(--wait)', hint: 'Stop the animated gesture hint.' },
      { type: 'Lock', color: 'var(--lock)', hint: 'Disable interactions.' },
      { type: 'Unlock', color: 'var(--unlock)', hint: 'Enable selected interactions.' },
      { type: 'Wait for event', color: 'var(--wait)', hint: 'Wait until gameplay reports an event.' }
    ];

    const TRANSITIONS = {
      Spawn: ['fade-in', 'scale-up', 'bounce-in', 'slide-up'],
      Hide: ['fade-out', 'scale-down']
    };
    const INTERACTIONS = ['DRAG_BOKS', 'DOUBLE_TAP_BOKS', 'DRAG_BLOCK', 'DROP_IN_SLOT', 'PRESS_PLAY', 'ALL'];
    const PERSISTENT_INTERACTIONS = ['DOUBLE_TAP_BOKS', 'DRAG_BLOCK', 'PRESS_PLAY'];
    const STAGE_ELEMENTS = ['boks', 'forward_block', 'left_block', 'right_block', 'slot', 'play_button', 'goal'];
    const ORIENTATIONS = ['right', 'down', 'left', 'up'];
    const PROGRAM_SLOT_OPTIONS = ['forward', 'left', 'right'];
    const HAND_HINTS = ['drag_block', 'press_play'];
    const EVENTS = ['BOKS_DRAG_RELEASED', 'BOKS_DOUBLE_TAPPED', 'BLOCK_RELEASED_WITHOUT_SLOT', 'BLOCK_DROPPED_IN_SLOT', 'PLAY_PRESSED', 'PROGRAM_EXECUTION_FINISHED'];
    const STORAGE_KEY = 'boks-dev-tutorial-editor-draft';
    const STORAGE_KEY_V2 = 'boks-dev-tutorial-editor-draft-v2';

    const state = {
      data: createDefaultData(),
      sequenceIndex: 0,
      beatIndex: -1,
      dataSource: 'default',
      lastDraftSavedAt: 0,
      draggedPaletteType: '',
      draggedBeatIndex: -1,
      audioAttachments: new Map(),
      repoAudioFiles: [],
      activeAudio: null,
      previewWindow: null,
      previewRunning: false,
      previewMode: 'current'
    };

    const els = {
      palette: document.getElementById('palette'),
      tabs: document.getElementById('sequenceTabs'),
      beatList: document.getElementById('beatList'),
      inspector: document.getElementById('inspector'),
      summary: document.getElementById('selectedSummary'),
      duration: document.getElementById('durationLabel'),
      draftStatus: document.getElementById('draftStatus'),
      exportStatus: document.getElementById('exportStatus'),
      previewButton: document.getElementById('previewBtn'),
      previewAllButton: document.getElementById('previewAllBtn'),
      saveDraftButton: document.getElementById('saveDraftBtn')
    };

    function createDefaultData() {
      return {
        sequences: [
          {
            id: 'orientation_intro',
            title: 'Orientation intro',
            startState: createEmptySequenceStartState(),
            beats: [
              {
                type: 'Narration',
                caption: 'Hello and welcome!!',
                audio: '',
                durationMs: 1800,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: 'Our adventure begins here.',
                audio: '',
                durationMs: 1800,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: 'This green meadow is a grid where our friend Bocs can move with your help!',
                audio: '',
                durationMs: 3400,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: 'Hey Bocs...where are you?',
                audio: '',
                durationMs: 2000,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              { type: 'Spawn', elementId: 'boks', transition: 'bounce-in', durationMs: 900, delayMs: 0 },
              { type: 'Pause', durationMs: 1500 },
              {
                type: 'Narration',
                caption: 'Here you are!',
                audio: '',
                durationMs: 1600,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: "Okay, let's see what happens if you double-click Bocs.",
                audio: '',
                durationMs: 2800,
                notes: ''
              },
              { type: 'Unlock', interactions: ['DOUBLE_TAP_BOKS'] },
              { type: 'Wait for event', eventName: 'BOKS_DOUBLE_TAPPED', minRepetitions: 1, completionCondition: '' },
              { type: 'Lock' },
              {
                type: 'Narration',
                caption: 'Did you see?',
                audio: '',
                durationMs: 1600,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: 'Now look down!',
                audio: '',
                durationMs: 1500,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: 'And what happens if you try again?',
                audio: '',
                durationMs: 2300,
                notes: ''
              },
              { type: 'Unlock', interactions: ['DOUBLE_TAP_BOKS'] },
              { type: 'Wait for event', eventName: 'BOKS_DOUBLE_TAPPED', minRepetitions: 1, completionCondition: '' },
              { type: 'Lock' },
              {
                type: 'Narration',
                caption: 'Oh, yes, now Bocs looks to your left.',
                audio: '',
                durationMs: 2600,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: 'Every time you double-click Bocs, he turns around and looks in a different direction.',
                audio: '',
                durationMs: 4600,
                notes: ''
              },
              { type: 'Unlock', interactions: ['DOUBLE_TAP_BOKS'] },
              { type: 'Wait for event', eventName: 'BOKS_DOUBLE_TAPPED', minRepetitions: 2, completionCondition: 'BOKS_FACING_INITIAL_ORIENTATION' },
              { type: 'Lock' },
              {
                type: 'Narration',
                caption: 'Okay, now Bocs would like to explore the world around him a little.',
                audio: '',
                durationMs: 3600,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: 'But to move, he needs your help.',
                audio: '',
                durationMs: 2400,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              {
                type: 'Narration',
                caption: "We have to tell Bocs where to go, and we'll need this.",
                audio: '',
                durationMs: 3600,
                notes: ''
              },
              { type: 'Pause', durationMs: 2000 },
              { type: 'Spawn', elementId: 'forward_block', transition: 'bounce-in', durationMs: 800, delayMs: 0 }
            ]
          }
        ]
      };
    }

    function getCurrentSequence() {
      return state.data.sequences[state.sequenceIndex] || state.data.sequences[0];
    }

    function createEmptySequenceStartState() {
      return {
        visibleElements: [],
        unlockedInteractions: [],
        boksOrientation: 'right',
        mainProgram: []
      };
    }

    function normalizeSequenceStartState(input) {
      const stateValue = input && typeof input === 'object' ? input : {};
      const visibleElements = Array.isArray(stateValue.visibleElements)
        ? Array.from(new Set(stateValue.visibleElements.map(normalizeElementId).filter(Boolean)))
        : [];
      const unlockedInteractions = Array.isArray(stateValue.unlockedInteractions)
        ? Array.from(new Set(stateValue.unlockedInteractions.filter(value => PERSISTENT_INTERACTIONS.includes(value))))
        : [];
      const boksOrientation = ORIENTATIONS.includes(stateValue.boksOrientation) ? stateValue.boksOrientation : 'right';
      const mainProgram = Array.isArray(stateValue.mainProgram)
        ? stateValue.mainProgram.map(normalizeProgramBlock).slice(0, 8)
        : [];
      return {
        visibleElements,
        unlockedInteractions,
        boksOrientation,
        mainProgram
      };
    }

    function cloneSequenceStartState(input) {
      return normalizeSequenceStartState(JSON.parse(JSON.stringify(normalizeSequenceStartState(input))));
    }

    function getSelectedBeat() {
      return getCurrentSequence()?.beats[state.beatIndex] || null;
    }

    function createBeat(type) {
      if (type === 'Narration') return withEditorDefaults({ type, caption: '', audioFilename: '', audioSource: '', durationMs: 3000, notes: '' });
      if (type === 'Pause') return { type, durationMs: 2000 };
      if (type === 'Spawn') return { type, elementId: '', transition: 'fade-in', durationMs: 600, delayMs: 0 };
      if (type === 'Hide') return { type, elementId: '', transition: 'fade-out', durationMs: 400 };
      if (type === 'Highlight') return { type, elementId: '' };
      if (type === 'Clear highlight') return { type };
      if (type === 'Hand hint') return { type, hintType: HAND_HINTS[0] };
      if (type === 'Clear hand hint') return { type };
      if (type === 'Lock') return { type };
      if (type === 'Unlock') return { type, interactions: [] };
      return { type: 'Wait for event', eventName: EVENTS[0], minRepetitions: 1, completionCondition: '' };
    }

    function withEditorDefaults(beat) {
      if (!beat._editorId) beat._editorId = `beat_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      return beat;
    }

    function normalizeEditorData() {
      state.data.sequences.forEach((sequence, index) => {
        if (!sequence.id) sequence.id = `sequence_${index + 1}`;
        if (!sequence.title) sequence.title = `Sequence ${index + 1}`;
        if (!Array.isArray(sequence.beats)) sequence.beats = [];
        sequence.startState = sequence.startState
          ? normalizeSequenceStartState(sequence.startState)
          : deriveSequenceStartState(index, state.data);
        sequence.beats.forEach(beat => {
          withEditorDefaults(beat);
          if (beat.type !== 'Narration') return;
          if (beat.audio && !beat.audioFilename) beat.audioFilename = String(beat.audio).split(/[\\/]/).pop();
          delete beat.audio;
          if (beat.audioSrc && !beat.audioFilename) beat.audioFilename = String(beat.audioSrc).split('/').pop();
          if (beat.audioSrc && !beat.audioSource) beat.audioSource = beat.audioSrc;
          delete beat.audioSrc;
          if (!beat.audioSource && beat.audioFilename) beat.audioSource = getRepoAudioPath(beat);
        });
        updateGeneratedAudioFilenames(sequence);
      });
    }

    function updateGeneratedAudioFilenames(sequence) {
      const narrationBeats = sequence.beats.filter(beat => beat.type === 'Narration');
      narrationBeats.forEach((beat, index) => {
        if (beat.audioFilenameEdited) return;
        beat.audioFilename = suggestAudioFilename(beat.caption || '', index + 1);
      });
    }

    function suggestAudioFilename(caption, index) {
      const words = String(caption || 'narration')
        .toLowerCase()
        .replace(/['’]/g, '')
        .replace(/[^a-z0-9\s]+/g, ' ')
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .slice(0, 5);
      const slug = words.length ? words.join('_') : 'narration';
      return `${String(index).padStart(2, '0')}_${slug}.mp3`;
    }

    function getNarrationIndex(sequence, targetBeat) {
      return sequence.beats
        .filter(beat => beat.type === 'Narration')
        .findIndex(beat => beat === targetBeat) + 1;
    }

    function render() {
      normalizeEditorData();
      renderPalette();
      renderTabs();
      renderTimeline();
      renderInspector();
      persistDraft();
      renderDraftStatus();
    }

    function renderDraftStatus() {
      if (!els.draftStatus) return;
      const sourceLabel = ({
        draft: 'Draft loaded',
        repo: 'Repo data loaded',
        default: 'Default sample loaded'
      })[state.dataSource] || 'Editor data loaded';
      const saveLabel = state.lastDraftSavedAt
        ? ` Last saved ${formatTimestamp(state.lastDraftSavedAt)}.`
        : ' Not saved yet.';
      els.draftStatus.textContent = `${sourceLabel}.${saveLabel}`;
    }

    function formatTimestamp(timestamp) {
      try {
        return new Date(timestamp).toLocaleString();
      } catch (_err) {
        return 'just now';
      }
    }

    function renderPalette() {
      els.palette.innerHTML = '';
      BEAT_TYPES.forEach(meta => {
        const block = document.createElement('div');
        block.className = 'palette-block';
        block.draggable = true;
        block.style.setProperty('--beat-color', meta.color);
        block.dataset.type = meta.type;
        block.innerHTML = `<strong>${meta.type}</strong><span>${meta.hint}</span>`;
        block.addEventListener('dragstart', event => {
          state.draggedPaletteType = meta.type;
          event.dataTransfer.effectAllowed = 'copy';
          event.dataTransfer.setData('application/x-boks-beat-type', meta.type);
        });
        block.addEventListener('dragend', () => {
          state.draggedPaletteType = '';
        });
        els.palette.appendChild(block);
      });
    }

    function renderTabs() {
      els.tabs.innerHTML = '';
      state.data.sequences.forEach((sequence, index) => {
        const tab = document.createElement('button');
        tab.className = 'tab' + (index === state.sequenceIndex ? ' active' : '');
        tab.type = 'button';
        tab.textContent = sequence.title || sequence.id || `Sequence ${index + 1}`;
        tab.addEventListener('click', () => {
          state.sequenceIndex = index;
          state.beatIndex = -1;
          render();
        });
        els.tabs.appendChild(tab);
      });
      const add = document.createElement('button');
      add.className = 'icon';
      add.type = 'button';
      add.textContent = '+';
      add.addEventListener('click', addSequence);
      els.tabs.appendChild(add);
    }

    function renderTimeline() {
      const sequence = getCurrentSequence();
      els.duration.textContent = `Estimated ${estimateSequenceDuration(sequence)} ms`;
      els.beatList.innerHTML = '';
      sequence.beats.forEach((beat, index) => {
        const card = document.createElement('div');
        card.className = 'beat-card' + (index === state.beatIndex ? ' active' : '');
        card.dataset.index = String(index);
        card.style.setProperty('--beat-color', getBeatColor(beat.type));
        card.innerHTML = `
          <span class="drag-handle" draggable="true" title="Drag to reorder" aria-label="Drag to reorder">≡</span>
          <span class="beat-dot"></span>
          <span class="beat-main">
            <span class="beat-title">${escapeHtml(beat.type)}</span>
            <span class="beat-preview">${escapeHtml(previewBeat(beat))}</span>
          </span>
          <button class="icon" type="button" aria-label="Delete beat">x</button>
        `;
        card.addEventListener('click', event => {
          if (event.target.closest('button')) return;
          state.beatIndex = index;
          render();
        });
        card.querySelector('button').addEventListener('click', event => {
          event.stopPropagation();
          deleteBeat(index);
        });
        card.querySelector('.drag-handle').addEventListener('dragstart', event => {
          state.draggedBeatIndex = index;
          card.classList.add('dragging');
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('application/x-boks-beat-index', String(index));
        });
        card.querySelector('.drag-handle').addEventListener('dragend', () => {
          state.draggedBeatIndex = -1;
          card.classList.remove('dragging');
        });
        card.addEventListener('dragover', event => {
          event.preventDefault();
          card.classList.add('over');
        });
        card.addEventListener('dragleave', () => card.classList.remove('over'));
        card.addEventListener('drop', event => {
          event.preventDefault();
          card.classList.remove('over');
          const rect = card.getBoundingClientRect();
          const after = event.clientY > rect.top + rect.height / 2;
          handleTimelineDrop(index + (after ? 1 : 0));
        });
        els.beatList.appendChild(card);
      });

      const dropZone = document.createElement('div');
      dropZone.className = 'drop-zone';
      dropZone.textContent = 'Drop a block here';
      dropZone.addEventListener('dragover', event => {
        event.preventDefault();
        dropZone.classList.add('over');
      });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
      dropZone.addEventListener('drop', event => {
        event.preventDefault();
        dropZone.classList.remove('over');
        handleTimelineDrop(sequence.beats.length);
      });
      els.beatList.appendChild(dropZone);
    }

    function renderInspector() {
      const beat = getSelectedBeat();
      if (!beat) {
        renderSequenceInspector();
        return;
      }
      els.summary.textContent = `${beat.type} beat`;
      const fields = [];
      if (beat.type === 'Narration') {
        fields.push(textareaField('caption', 'Caption text', beat.caption || ''));
        fields.push(numberField('durationMs', 'Caption duration in ms', beat.durationMs || 0));
        fields.push(audioSectionField(beat));
        fields.push(textareaField('notes', 'Internal notes', beat.notes || ''));
      } else if (beat.type === 'Pause') {
        fields.push(numberField('durationMs', 'Duration in ms', beat.durationMs || 0));
      } else if (beat.type === 'Spawn') {
        fields.push(textField('elementId', 'Element id', beat.elementId || ''));
        fields.push(selectField('transition', 'Transition effect', TRANSITIONS.Spawn, beat.transition || 'fade-in'));
        fields.push(numberField('durationMs', 'Duration ms', beat.durationMs || 0));
        fields.push(numberField('delayMs', 'Delay ms', beat.delayMs || 0));
      } else if (beat.type === 'Hide') {
        fields.push(textField('elementId', 'Element id', beat.elementId || ''));
        fields.push(selectField('transition', 'Transition effect', TRANSITIONS.Hide, beat.transition || 'fade-out'));
        fields.push(numberField('durationMs', 'Duration ms', beat.durationMs || 0));
      } else if (beat.type === 'Highlight') {
        fields.push(textField('elementId', 'Element id', beat.elementId || ''));
      } else if (beat.type === 'Clear highlight') {
        fields.push('<div class="empty-state">Stops whichever tutorial highlight is currently active.</div>');
      } else if (beat.type === 'Hand hint') {
        fields.push(selectField('hintType', 'Hint type', HAND_HINTS, beat.hintType || HAND_HINTS[0]));
      } else if (beat.type === 'Clear hand hint') {
        fields.push('<div class="empty-state">Stops the animated gesture hint.</div>');
      } else if (beat.type === 'Lock') {
        fields.push('<div class="empty-state">No configuration needed.</div>');
      } else if (beat.type === 'Unlock') {
        fields.push(tagPickerField('interactions', 'Allowed interactions', INTERACTIONS, beat.interactions || []));
      } else if (beat.type === 'Wait for event') {
        fields.push(selectField('eventName', 'Event name', EVENTS, beat.eventName || EVENTS[0]));
        fields.push(numberField('minRepetitions', 'Minimum repetitions', beat.minRepetitions || 1));
        fields.push(textField('completionCondition', 'Optional completion condition name', beat.completionCondition || ''));
      }
      els.inspector.innerHTML = fields.join('');
      bindInspectorFields();
    }

    function renderSequenceInspector() {
      const sequence = getCurrentSequence();
      if (!sequence) {
        els.summary.textContent = 'No sequence selected.';
        els.inspector.innerHTML = '<div class="empty-state">Select a sequence to edit its checkpoint.</div>';
        return;
      }
      const startState = normalizeSequenceStartState(sequence.startState);
      els.summary.textContent = `${sequence.title || sequence.id || 'Sequence'} checkpoint`;
      els.inspector.innerHTML = [
        textField('title', 'Sequence title', sequence.title || '', 'data-sequence-field'),
        selectField('boksOrientation', 'Starting Boks orientation', ORIENTATIONS, startState.boksOrientation, 'data-sequence-field'),
        tagPickerField('visibleElements', 'Visible elements at sequence start', STAGE_ELEMENTS, startState.visibleElements, 'data-sequence-tag-field'),
        tagPickerField('unlockedInteractions', 'Unlocked interactions at sequence start', PERSISTENT_INTERACTIONS, startState.unlockedInteractions, 'data-sequence-tag-field'),
        programSlotField(startState.mainProgram),
        '<div class="audio-row"><button id="resetSequenceStateBtn" type="button">Reset from previous sequence</button></div>',
        '<div class="hint">Preview starts from this checkpoint, then plays only the current sequence.</div>'
      ].join('');
      bindSequenceInspectorFields();
    }

    function programSlotField(mainProgram) {
      const selected = mainProgram[0] || '';
      return `
        <label>Program slot 1 at sequence start
          <select data-sequence-program-slot="0">
            <option value="">Empty</option>
            ${PROGRAM_SLOT_OPTIONS.map(option => `<option value="${escapeAttr(option)}"${option === selected ? ' selected' : ''}>${escapeHtml(option)}</option>`).join('')}
          </select>
        </label>
      `;
    }

    function textField(key, label, value, attrName = 'data-field') {
      return `<label>${label}<input ${attrName}="${key}" type="text" value="${escapeAttr(value)}"></label>`;
    }

    function numberField(key, label, value, attrName = 'data-field') {
      return `<label>${label}<input ${attrName}="${key}" type="number" min="0" step="1" value="${escapeAttr(value)}"></label>`;
    }

    function textareaField(key, label, value) {
      return `<label>${label}<textarea data-field="${key}">${escapeHtml(value)}</textarea></label>`;
    }

    function selectField(key, label, options, value, attrName = 'data-field') {
      return `
        <label>${label}
          <select ${attrName}="${key}">
            ${options.map(option => `<option value="${escapeAttr(option)}"${option === value ? ' selected' : ''}>${escapeHtml(option)}</option>`).join('')}
          </select>
        </label>
      `;
    }

    function tagPickerField(key, label, options, selected, attrName = 'data-field') {
      const active = new Set(selected);
      return `
        <label>${label}</label>
        <div class="tag-picker" ${attrName}="${key}">
          ${options.map(option => `<button class="tag${active.has(option) ? ' active' : ''}" type="button" data-value="${escapeAttr(option)}">${escapeHtml(option)}</button>`).join('')}
        </div>
      `;
    }

    function audioSectionField(beat) {
      const attachment = state.audioAttachments.get(beat._editorId);
      const loadedLabel = getAudioLoadedLabel(beat, attachment);
      const selectedRepoAudio = getSelectedRepoAudioName(beat);
      return `
        <div class="audio-box">
          <label>Repo audio file
            <select id="repoAudioSelect">
              <option value="">Select file from assets/audio/sfx/gameplay</option>
              ${state.repoAudioFiles.map(filename => `<option value="${escapeAttr(filename)}"${filename === selectedRepoAudio ? ' selected' : ''}>${escapeHtml(filename)}</option>`).join('')}
            </select>
          </label>
          <label>Export filename
            <input data-field="audioFilename" type="text" value="${escapeAttr(beat.audioFilename || '')}">
          </label>
          <div class="audio-row">
            <button id="refreshRepoAudioBtn" type="button">Refresh repo files</button>
            <button id="chooseAudioBtn" type="button">Choose audio file</button>
            <button id="playAudioBtn" type="button">${state.activeAudio ? 'Stop' : 'Play'}</button>
            <button id="regenerateAudioBtn" type="button">Regenerate filename</button>
          </div>
          <label>Absolute file path or URL
            <input data-field="audioSource" type="text" value="${escapeAttr(beat.audioSource || '')}">
          </label>
          <div class="hint">${escapeHtml(loadedLabel)}</div>
          <div class="hint">Preview URL: ${escapeHtml(getPreviewAudioSrc(beat) || 'none')}</div>
          <div id="audioWarning" class="audio-warning${beat.audioLoadFailed ? ' show' : ''}">file not found</div>
          <input id="audioFileInput" type="file" accept="audio/*" hidden>
        </div>
      `;
    }

    function getAudioLoadedLabel(beat, attachment) {
      if (attachment?.name) return `Loaded: ${attachment.name}`;
      const selectedRepoAudio = getSelectedRepoAudioName(beat);
      if (selectedRepoAudio) return `Repo file: ${selectedRepoAudio}`;
      if (beat.audioSource) return `Loaded path: ${beat.audioSource}`;
      if (beat.audioDisplayName) return `Previously selected: ${beat.audioDisplayName}. Rechoose it or paste its path to preview/export.`;
      return `Suggested export: ${beat.audioFilename || ''}`;
    }

    function getSelectedRepoAudioName(beat) {
      const source = String(beat?.audioSource || '').trim();
      if (/^\/?assets\/audio\/sfx\/gameplay\//i.test(source)) return source.split('/').pop() || '';
      const filename = String(beat?.audioFilename || '').trim();
      return state.repoAudioFiles.includes(filename) ? filename : '';
    }

    function bindInspectorFields() {
      els.inspector.querySelectorAll('[data-field]').forEach(input => {
        if (input.classList.contains('tag-picker')) return;
        input.addEventListener('input', updateBeatFromInput);
        input.addEventListener('change', updateBeatFromInput);
      });
      document.getElementById('chooseAudioBtn')?.addEventListener('click', () => {
        document.getElementById('audioFileInput')?.click();
      });
      document.getElementById('repoAudioSelect')?.addEventListener('change', handleRepoAudioSelected);
      document.getElementById('refreshRepoAudioBtn')?.addEventListener('click', refreshRepoAudioFilesForInspector);
      document.getElementById('audioFileInput')?.addEventListener('change', handleAudioFilePicked);
      document.getElementById('playAudioBtn')?.addEventListener('click', toggleSelectedAudio);
      document.getElementById('regenerateAudioBtn')?.addEventListener('click', regenerateSelectedAudioFilename);
      els.inspector.querySelectorAll('.tag').forEach(button => {
        button.addEventListener('click', () => {
          const beat = getSelectedBeat();
          if (!beat) return;
          const value = button.dataset.value;
          const set = new Set(beat.interactions || []);
          if (set.has(value)) set.delete(value);
          else set.add(value);
          beat.interactions = Array.from(set);
          render();
        });
      });
    }

    function handleRepoAudioSelected(event) {
      const beat = getSelectedBeat();
      const filename = String(event.target.value || '').trim();
      if (!beat) return;
      if (!filename) {
        beat.audioSource = '';
        beat.audioDisplayName = '';
        beat.audioLoadFailed = false;
        persistDraft();
        renderInspector();
        return;
      }
      const previousAttachment = state.audioAttachments.get(beat._editorId);
      if (previousAttachment?.kind === 'file' && previousAttachment?.objectUrl) {
        try { URL.revokeObjectURL(previousAttachment.objectUrl); } catch (_err) {}
      }
      state.audioAttachments.delete(beat._editorId);
      beat.audioFilename = filename;
      beat.audioFilenameEdited = true;
      beat.audioSource = `assets/audio/sfx/gameplay/${filename}`;
      beat.audioDisplayName = filename;
      beat.audioDraftDataUrl = '';
      beat.audioDraftBase64 = '';
      beat.audioDraftMimeType = '';
      beat.audioLoadFailed = false;
      testAudioSource(beat);
      persistDraft();
      renderInspector();
    }

    async function refreshRepoAudioFilesForInspector() {
      els.exportStatus.textContent = 'Refreshing repo audio files...';
      await loadRepoAudioFiles();
      els.exportStatus.textContent = `Loaded ${state.repoAudioFiles.length} repo audio files.`;
      renderInspector();
    }

    function bindSequenceInspectorFields() {
      els.inspector.querySelectorAll('[data-sequence-field]').forEach(input => {
        input.addEventListener('input', updateSequenceFromInput);
        input.addEventListener('change', updateSequenceFromInput);
      });
      els.inspector.querySelectorAll('[data-sequence-tag-field] .tag').forEach(button => {
        button.addEventListener('click', () => {
          const sequence = getCurrentSequence();
          if (!sequence) return;
          const field = button.closest('[data-sequence-tag-field]')?.dataset.sequenceTagField;
          const value = button.dataset.value;
          if (!field || !value) return;
          const set = new Set(sequence.startState?.[field] || []);
          if (set.has(value)) set.delete(value);
          else set.add(value);
          sequence.startState[field] = field === 'visibleElements'
            ? Array.from(set).map(normalizeElementId).filter(Boolean)
            : Array.from(set).filter(item => PERSISTENT_INTERACTIONS.includes(item));
          render();
        });
      });
      els.inspector.querySelectorAll('[data-sequence-program-slot]').forEach(input => {
        input.addEventListener('change', updateSequenceProgramSlotFromInput);
      });
      document.getElementById('resetSequenceStateBtn')?.addEventListener('click', () => {
        const sequence = getCurrentSequence();
        if (!sequence) return;
        sequence.startState = deriveSequenceStartState(state.sequenceIndex, state.data);
        render();
      });
    }

    function updateSequenceProgramSlotFromInput(event) {
      const sequence = getCurrentSequence();
      if (!sequence) return;
      sequence.startState = normalizeSequenceStartState(sequence.startState);
      const slotIndex = Math.max(0, Number(event.target.dataset.sequenceProgramSlot) || 0);
      const nextProgram = sequence.startState.mainProgram.slice();
      nextProgram[slotIndex] = normalizeProgramBlock(event.target.value);
      sequence.startState.mainProgram = nextProgram;
      render();
    }

    function updateSequenceFromInput(event) {
      const sequence = getCurrentSequence();
      if (!sequence) return;
      const key = event.target.dataset.sequenceField;
      if (key === 'title') sequence.title = event.target.value;
      else {
        sequence.startState = normalizeSequenceStartState(sequence.startState);
        sequence.startState[key] = event.target.value;
      }
      renderTabs();
      renderInspector();
      persistDraft();
    }

    function updateBeatFromInput(event) {
      const beat = getSelectedBeat();
      if (!beat) return;
      const key = event.target.dataset.field;
      if (key === 'minRepetitions') beat[key] = Math.max(1, Number(event.target.value) || 1);
      else if (event.target.type === 'number') beat[key] = Number(event.target.value) || 0;
      else beat[key] = event.target.value;
      if (key === 'caption' && beat.type === 'Narration' && !beat.audioFilenameEdited) {
        beat.audioFilename = suggestAudioFilename(beat.caption || '', getNarrationIndex(getCurrentSequence(), beat));
        const filenameInput = els.inspector.querySelector('[data-field="audioFilename"]');
        if (filenameInput) filenameInput.value = beat.audioFilename;
      }
      if (key === 'audioFilename') {
        beat.audioFilenameEdited = true;
        const filename = String(beat.audioFilename || '').trim();
        if (state.repoAudioFiles.includes(filename)) {
          state.audioAttachments.delete(beat._editorId);
          beat.audioSource = getRepoAudioPath(beat);
          beat.audioDisplayName = filename;
          beat.audioLoadFailed = false;
          testAudioSource(beat);
        }
      }
      if (key === 'audioSource') {
        state.audioAttachments.delete(beat._editorId);
        beat.audioLoadFailed = false;
        testAudioSource(beat);
      }
      renderTimeline();
      persistDraft();
    }

    async function handleAudioFilePicked(event) {
      const beat = getSelectedBeat();
      const file = event.target.files?.[0];
      if (!beat || !file) return;
      const previousAttachment = state.audioAttachments.get(beat._editorId);
      if (previousAttachment?.objectUrl) {
        try { URL.revokeObjectURL(previousAttachment.objectUrl); } catch (_err) {}
      }
      const objectUrl = URL.createObjectURL(file);
      const repoAudioPath = `assets/audio/sfx/gameplay/${file.name}`;
      state.audioAttachments.set(beat._editorId, {
        kind: 'file',
        file,
        name: file.name,
        objectUrl
      });
      beat.audioFilename = file.name;
      beat.audioFilenameEdited = true;
      beat.audioDisplayName = file.name;
      beat.audioSource = repoAudioPath;
      beat.audioDraftDataUrl = await fileToDataUrl(file).catch(() => '');
      beat.audioDraftBase64 = beat.audioDraftDataUrl ? String(beat.audioDraftDataUrl).split(',')[1] || '' : '';
      beat.audioDraftMimeType = file.type || 'audio/mpeg';
      beat.audioLoadFailed = false;
      testAudioSource(beat);
      event.target.value = '';
      persistDraft();
      renderInspector();
    }

    function getRepoAudioPath(beat) {
      const filename = String(beat?.audioFilename || '').trim();
      if (!filename) return '';
      return `assets/audio/sfx/gameplay/${filename}`;
    }

    function toggleSelectedAudio() {
      const beat = getSelectedBeat();
      if (!beat) return;
      if (state.activeAudio) {
        stopActiveAudio();
        renderInspector();
        return;
      }
      const src = getPreviewAudioSrc(beat);
      if (!src) {
        beat.audioLoadFailed = true;
        renderInspector();
        return;
      }
      const audio = new Audio(src);
      state.activeAudio = audio;
      audio.addEventListener('ended', () => {
        state.activeAudio = null;
        renderInspector();
      }, { once: true });
      audio.addEventListener('error', () => {
        beat.audioLoadFailed = true;
        state.activeAudio = null;
        renderInspector();
      }, { once: true });
      audio.play().catch(() => {
        beat.audioLoadFailed = true;
        state.activeAudio = null;
        renderInspector();
      });
      renderInspector();
    }

    function stopActiveAudio() {
      if (!state.activeAudio) return;
      state.activeAudio.pause();
      state.activeAudio.currentTime = 0;
      state.activeAudio = null;
    }

    function getPreviewAudioSrc(beat) {
      const attachment = state.audioAttachments.get(beat._editorId);
      if (attachment?.objectUrl && attachment.kind !== 'repo') return attachment.objectUrl;
      if (beat.audioDraftDataUrl) return beat.audioDraftDataUrl;
      const source = beat.audioSource || getRepoAudioPath(beat);
      if (!source) return '';
      if (/^https?:\/\//i.test(source)) return source;
      if (/^\/?assets\//i.test(source)) return `/${source.replace(/^\//, '')}`;
      if (/^\/?audio\//i.test(source)) return `/${source.replace(/^\//, '')}`;
      return `/dev/tutorial-editor/api/local-audio?path=${encodeURIComponent(source)}`;
    }

    async function testAudioSource(beat) {
      if (!beat.audioSource && !beat.audioFilename) return;
      const src = getPreviewAudioSrc(beat);
      if (!src) return;
      try {
        const response = await fetch(src, { cache: 'no-store' });
        beat.audioLoadFailed = !response.ok;
        renderInspector();
        return;
      } catch (_err) {
        // Fall through to Audio for blob/data URLs or browser-only sources.
      }
      const audio = new Audio(src);
      audio.addEventListener('canplay', () => {
        beat.audioLoadFailed = false;
        renderInspector();
      }, { once: true });
      audio.addEventListener('error', () => {
        beat.audioLoadFailed = true;
        renderInspector();
      }, { once: true });
      audio.load();
    }

    function regenerateSelectedAudioFilename() {
      const beat = getSelectedBeat();
      if (!beat || beat.type !== 'Narration') return;
      const previousRepoPath = getRepoAudioPath(beat);
      beat.audioFilename = suggestAudioFilename(beat.caption || '', getNarrationIndex(getCurrentSequence(), beat));
      beat.audioFilenameEdited = false;
      if (!beat.audioSource || beat.audioSource === previousRepoPath || /^\/?assets\/audio\/sfx\/gameplay\//i.test(beat.audioSource)) {
        beat.audioSource = getRepoAudioPath(beat);
      }
      beat.audioLoadFailed = false;
      testAudioSource(beat);
      render();
    }

    function addSequence() {
      const number = state.data.sequences.length + 1;
      state.data.sequences.push({
        id: `sequence_${number}`,
        title: `Sequence ${number}`,
        startState: deriveSequenceStartState(state.data.sequences.length, state.data),
        beats: []
      });
      state.sequenceIndex = state.data.sequences.length - 1;
      state.beatIndex = -1;
      render();
    }

    function handleTimelineDrop(targetIndex) {
      const sequence = getCurrentSequence();
      if (state.draggedPaletteType) {
        const beat = createBeat(state.draggedPaletteType);
        if (beat.type === 'Pause') beat.durationMs = suggestPauseDuration(sequence.beats[targetIndex - 1]);
        sequence.beats.splice(targetIndex, 0, beat);
        state.beatIndex = targetIndex;
        state.draggedPaletteType = '';
        render();
        return;
      }
      if (state.draggedBeatIndex >= 0) {
        const [beat] = sequence.beats.splice(state.draggedBeatIndex, 1);
        const insertIndex = state.draggedBeatIndex < targetIndex ? targetIndex - 1 : targetIndex;
        sequence.beats.splice(insertIndex, 0, beat);
        state.beatIndex = insertIndex;
        state.draggedBeatIndex = -1;
        render();
      }
    }

    function suggestPauseDuration(previousBeat) {
      if (previousBeat?.type === 'Spawn') return 1500;
      return 2000;
    }

    function deleteBeat(index = state.beatIndex) {
      const sequence = getCurrentSequence();
      if (index < 0 || index >= sequence.beats.length) return;
      sequence.beats.splice(index, 1);
      state.beatIndex = Math.min(index, sequence.beats.length - 1);
      render();
    }

    function duplicateBeat() {
      const sequence = getCurrentSequence();
      const beat = getSelectedBeat();
      if (!beat) return;
      sequence.beats.splice(state.beatIndex + 1, 0, clone(beat));
      state.beatIndex += 1;
      render();
    }

    async function previewSequence(mode = 'current') {
      if (state.previewRunning) {
        stopPreviewInGame();
        return;
      }
      state.previewMode = mode;
      const previewUrl = new URL(`/?tutorialPreview=${Date.now()}`, window.location.href);
      const previewWindow = window.open('about:blank', 'boks-tutorial-preview');
      if (!previewWindow) {
        els.exportStatus.textContent = 'Popup blocked. Opening preview in this tab...';
        exportTutorialData({ silent: true }).catch(() => {});
        window.location.href = previewUrl.href;
        return;
      }
      previewWindow.document.write('<!doctype html><title>BOKS preview</title><p style="font-family:sans-serif">Preparing tutorial preview...</p>');
      previewWindow.document.close();
      try {
        exportTutorialData({ silent: true }).catch(() => {});
        const legacyData = mode === 'all'
          ? await buildFullPreviewLegacyData()
          : await buildPreviewLegacyData(state.sequenceIndex);
        await startPreviewInGame(previewWindow, previewUrl.href, legacyData);
      } catch (err) {
        if (!previewWindow.closed) {
          previewWindow.document.open();
          previewWindow.document.write(`<!doctype html><title>BOKS preview failed</title><p style="font-family:sans-serif;color:#9b2c2c">Preview failed: ${escapeHtml(err.message)}</p>`);
          previewWindow.document.close();
        }
        state.previewRunning = false;
        state.previewWindow = null;
        state.previewMode = 'current';
        updatePreviewButton();
        els.exportStatus.textContent = `Preview failed: ${err.message}`;
      }
    }

    async function startPreviewInGame(previewWindow, previewUrl, legacyData) {
      previewWindow.location.href = previewUrl;
      state.previewWindow = previewWindow;
      state.previewRunning = true;
      updatePreviewButton();
      els.exportStatus.textContent = state.previewMode === 'all'
        ? 'Full tutorial preview opening in game...'
        : 'Preview opening in game...';
      await waitForGamePreview(previewWindow, legacyData);
    }

    async function waitForGamePreview(previewWindow, legacyData) {
      const started = await waitUntil(() => {
        if (previewWindow.closed) throw new Error('preview window closed');
        const doc = previewWindow.document;
        const button = doc?.getElementById('startTutorialBtn');
        if (!button || !previewWindow.BOKS_TUTORIAL_DATA || !previewWindow.BOKS_TUTORIAL_PREVIEW?.startWithAudio) return false;
        previewWindow.BOKS_TUTORIAL_DATA = legacyData;
        showPreviewStartOverlay(previewWindow);
        return true;
      }, 12000);
      if (!started) throw new Error('game did not become ready');
    }

    async function buildPreviewLegacyData(sequenceIndex) {
      normalizeEditorData();
      const sequence = state.data.sequences[sequenceIndex] || state.data.sequences[0] || { id: 'intro', title: 'Intro', beats: [] };
      const beats = buildSequenceStartSetupBeats(getResolvedSequenceStartState(sequenceIndex));
      for (let i = 0; i < sequence.beats.length; i++) {
        const beat = sequence.beats[i];
        if (beat.type !== 'Narration') {
          beats.push(...canonicalBeatToLegacy(stripInternalFields(beat), i));
          continue;
        }
        const legacyBeat = {
          id: legacyBeatId(beat, i),
          type: 'narration',
          text: beat.caption || '',
          durationMs: Number(beat.durationMs) || 0
        };
        const audioSrc = await resolvePreviewAudioSrc(beat);
        if (audioSrc) legacyBeat.audio = audioSrc;
        beats.push(legacyBeat);
      }
      return { intro: { id: sequence.id || 'intro', title: sequence.title || 'Intro', beats } };
    }

    async function buildFullPreviewLegacyData() {
      normalizeEditorData();
      const sequences = Array.isArray(state.data?.sequences) ? state.data.sequences : [];
      const firstSequence = sequences[0] || { id: 'intro', title: 'Intro', beats: [], startState: createEmptySequenceStartState() };
      const beats = [];
      for (let sequenceIndex = 0; sequenceIndex < sequences.length; sequenceIndex++) {
        const sequence = sequences[sequenceIndex];
        const currentStart = getResolvedSequenceStartState(sequenceIndex);
        if (sequenceIndex === 0) {
          beats.push(...buildSequenceStartSetupBeats(currentStart));
        } else {
          const previousFinal = buildDerivedSequenceFinalSnapshot(sequenceIndex - 1);
          beats.push(...buildSequenceTransitionSetupBeats(previousFinal, currentStart));
        }
        const sequenceBeats = Array.isArray(sequence?.beats) ? sequence.beats : [];
        for (let beatIndex = 0; beatIndex < sequenceBeats.length; beatIndex++) {
          const beat = sequenceBeats[beatIndex];
          if (beat.type !== 'Narration') {
            beats.push(...canonicalBeatToLegacy(stripInternalFields(beat), `${sequenceIndex}-${beatIndex}`));
            continue;
          }
          const legacyBeat = {
            id: legacyBeatId(beat, `${sequenceIndex}-${beatIndex}`),
            type: 'narration',
            text: beat.caption || '',
            durationMs: Number(beat.durationMs) || 0
          };
          const audioSrc = await resolvePreviewAudioSrc(beat);
          if (audioSrc) legacyBeat.audio = audioSrc;
          beats.push(legacyBeat);
        }
      }
      return {
        intro: {
          id: firstSequence.id || 'intro',
          title: `${firstSequence.title || 'Intro'} full preview`,
          beats
        }
      };
    }

    async function resolvePreviewAudioSrc(beat) {
      const attachment = state.audioAttachments.get(beat._editorId);
      if (attachment?.file) {
        try { return await fileToDataUrl(attachment.file); } catch (_e) {}
      }
      if (attachment?.objectUrl && attachment.kind !== 'repo') return attachment.objectUrl;
      if (beat.audioDraftDataUrl) return beat.audioDraftDataUrl;
      const src = beat.audioSource || getRepoAudioPath(beat) || '';
      if (!src) return '';
      if (/^https?:\/\//i.test(src)) return src;
      if (/^\/?assets\//i.test(src)) return `/${src.replace(/^\//, '')}`;
      try {
        const url = `/dev/tutorial-editor/api/local-audio?path=${encodeURIComponent(src)}`;
        const res = await fetch(url, { cache: 'no-store' });
        if (res.ok) {
          const blob = await res.blob();
          return await blobToDataUrl(blob);
        }
      } catch (_e) {}
      return '';
    }

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result));
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(blob);
      });
    }

    function buildLegacyDataObject(data, sequenceIndex) {
      const sequence = data.sequences[sequenceIndex] || data.sequences[0] || { id: 'intro', title: 'Intro', beats: [] };
      return {
        intro: {
          id: sequence.id || 'intro',
          title: sequence.title || 'Intro',
          beats: [
            ...buildSequenceStartSetupBeats(getResolvedSequenceStartState(sequenceIndex, data)),
            ...sequence.beats.flatMap((beat, index) => canonicalBeatToLegacy(beat, index))
          ]
        }
      };
    }

    function showPreviewStartOverlay(previewWindow) {
      const doc = previewWindow.document;
      if (doc.getElementById('tutorialPreviewStartOverlay')) return;
      const overlay = doc.createElement('div');
      overlay.id = 'tutorialPreviewStartOverlay';
      overlay.innerHTML = `
        <button type="button">Start preview with audio</button>
        <p>Chrome needs one real click in the game window before narration audio can play.</p>
      `;
      overlay.style.cssText = [
        'position:fixed',
        'inset:0',
        'z-index:999999',
        'display:grid',
        'place-content:center',
        'gap:14px',
        'text-align:center',
        'background:rgba(248,247,242,0.92)',
        'font-family:Trebuchet MS, sans-serif',
        'color:#1f2933'
      ].join(';');
      const startButton = overlay.querySelector('button');
      startButton.style.cssText = [
        'min-width:240px',
        'min-height:56px',
        'border:0',
        'border-radius:999px',
        'background:#235f8f',
        'color:white',
        'font:inherit',
        'font-weight:800',
        'cursor:pointer',
        'box-shadow:0 12px 26px rgba(31,41,51,0.22)'
      ].join(';');
      doc.body.appendChild(overlay);
      const script = doc.createElement('script');
      script.textContent = `
        (() => {
          const overlay = document.getElementById('tutorialPreviewStartOverlay');
          const button = overlay?.querySelector('button');
          button?.addEventListener('click', () => {
            overlay?.remove();
            window.BOKS_TUTORIAL_PREVIEW?.startWithAudio?.();
          }, { once: true });
        })();
      `;
      doc.body.appendChild(script);
      els.exportStatus.textContent = 'Preview ready. Click "Start preview with audio" in the game window.';
    }

    function stopPreviewInGame() {
      const previewWindow = state.previewWindow;
      try {
        previewWindow?.BOKS_TUTORIAL_ENGINE?.create?.()?.stop?.();
      } catch (_err) {}
      if (previewWindow && !previewWindow.closed) previewWindow.close();
      state.previewWindow = null;
      state.previewRunning = false;
      state.previewMode = 'current';
      updatePreviewButton();
      els.exportStatus.textContent = 'Preview stopped.';
    }

    function updatePreviewButton() {
      els.previewButton.textContent = state.previewRunning && state.previewMode === 'current'
        ? 'Stop preview'
        : 'Preview current sequence';
      els.previewAllButton.textContent = state.previewRunning && state.previewMode === 'all'
        ? 'Stop preview'
        : 'Preview full tutorial';
    }

    function waitUntil(check, timeoutMs) {
      const startedAt = Date.now();
      return new Promise((resolve, reject) => {
        const tick = () => {
          try {
            const result = check();
            if (result) {
              resolve(true);
              return;
            }
            if (Date.now() - startedAt >= timeoutMs) {
              resolve(false);
              return;
            }
            window.setTimeout(tick, 120);
          } catch (err) {
            reject(err);
          }
        };
        tick();
      });
    }

    async function exportTutorialData(options = {}) {
      const silent = !!options.silent;
      normalizeEditorData();
      const files = await collectAudioExportFiles();
      const canonicalData = buildCanonicalTutorialData(state.data);
      const source = buildTypeScriptSource(canonicalData);
      const legacySource = buildLegacyTutorialSource(canonicalData, state.sequenceIndex);
      if (!silent) els.exportStatus.textContent = 'Exporting...';
      try {
        const response = await fetch('/dev/tutorial-editor/api/export', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ source, legacySource, files })
        });
        if (response.ok) {
          let result = {};
          try {
            result = await response.json();
          } catch (_err) {}
          const warningText = result.warnings?.length
            ? ` Warnings: ${result.warnings.join(' | ')}`
            : '';
          if (!silent) els.exportStatus.textContent = `Exported TS and legacy tutorial data.${warningText}`;
          return;
        }
        let message = `export failed (${response.status})`;
        try {
          const result = await response.json();
          if (result?.error) message = result.error;
        } catch (_err) {
          const text = await response.text().catch(() => '');
          if (text) message = text;
        }
        if (silent) throw new Error(message);
      } catch (_err) {
        if (silent) throw _err;
        // Static hosting fallback below.
      }

      if (window.showSaveFilePicker) {
        const handle = await window.showSaveFilePicker({
          suggestedName: 'tutorialData.ts',
          types: [{ description: 'TypeScript', accept: { 'text/plain': ['.ts'] } }]
        });
        const writable = await handle.createWritable();
        await writable.write(source);
        await writable.close();
        if (!silent) els.exportStatus.textContent = 'Exported via file picker.';
        return;
      }

      const blob = new Blob([source], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = 'tutorialData.ts';
      link.click();
      URL.revokeObjectURL(link.href);
      if (!silent) els.exportStatus.textContent = 'Downloaded tutorialData.ts.';
    }

    function buildCanonicalTutorialData(data) {
      return {
        sequences: data.sequences.map(sequence => ({
          id: sequence.id,
          title: sequence.title,
          startState: normalizeSequenceStartState(sequence.startState),
          beats: sequence.beats.map(stripInternalFields)
        }))
      };
    }

    function buildTypeScriptSource(data) {
      return `export const tutorialData = ${JSON.stringify(data, null, 2)} as const;\n\nexport type TutorialData = typeof tutorialData;\n`;
    }

    function buildLegacyTutorialSource(data, sequenceIndex) {
      const sequence = data.sequences[sequenceIndex] || data.sequences[0] || { id: 'intro', title: 'Intro', beats: [] };
      const legacy = {
        intro: {
          id: sequence.id || 'intro',
          title: sequence.title || 'Intro',
          beats: [
            ...buildSequenceStartSetupBeats(getResolvedSequenceStartState(sequenceIndex, data)),
            ...sequence.beats.flatMap((beat, index) => canonicalBeatToLegacy(beat, index))
          ]
        }
      };
      return `(() => {\n  window.BOKS_TUTORIAL_DATA = ${JSON.stringify(legacy, null, 2)};\n})();\n`;
    }

    function canonicalBeatToLegacy(beat, index) {
      if (beat.type === 'Narration') {
        const legacyBeat = {
          id: legacyBeatId(beat, index),
          type: 'narration',
          text: beat.caption || '',
          durationMs: Number(beat.durationMs) || 0
        };
        if (beat.audioSrc) legacyBeat.audio = beat.audioSrc;
        return [legacyBeat];
      }
      if (beat.type === 'Pause') {
        return [{ id: legacyBeatId(beat, index), type: 'pause', durationMs: Number(beat.durationMs) || 0 }];
      }
      if (beat.type === 'Spawn') {
        return [{ id: legacyBeatId(beat, index), type: 'call', action: spawnActionForElement(beat.elementId) }];
      }
      if (beat.type === 'Hide') {
        return [{ id: legacyBeatId(beat, index), type: 'call', action: 'hideElement', target: beat.elementId || '' }];
      }
      if (beat.type === 'Highlight') {
        return [{ id: legacyBeatId(beat, index), type: 'call', action: 'highlightElement', target: beat.elementId || '' }];
      }
      if (beat.type === 'Clear highlight') {
        return [{ id: legacyBeatId(beat, index), type: 'call', action: 'clearHighlight' }];
      }
      if (beat.type === 'Hand hint') {
        return [{ id: legacyBeatId(beat, index), type: 'call', action: handHintActionForBeat(beat) }];
      }
      if (beat.type === 'Clear hand hint') {
        return [{ id: legacyBeatId(beat, index), type: 'call', action: 'clearHandHint' }];
      }
      if (beat.type === 'Lock') {
        return interactionCallsForBeat(beat, index, 'lock');
      }
      if (beat.type === 'Unlock') {
        return interactionCallsForBeat(beat, index, 'unlock');
      }
      if (beat.type === 'Wait for event') {
        return [{
          id: legacyBeatId(beat, index),
          type: 'waitFor',
          event: legacyEventName(beat),
          count: Math.max(1, Number(beat.minRepetitions) || 1)
        }];
      }
      return [];
    }

    function interactionCallsForBeat(beat, index, mode) {
      const prefix = mode === 'lock' ? 'lock' : 'unlock';
      const interactions = normalizeInteractionList(beat.interactions, mode);
      if (!interactions.length) return [];
      return interactions.map((interaction, actionIndex) => ({
        id: `${legacyBeatId(beat, index)}-${actionIndex + 1}`,
        type: 'call',
        action: interactionToLegacyAction(interaction, prefix)
      })).filter(call => !!call.action);
    }

    function handHintActionForBeat(beat) {
      if ((beat.hintType || HAND_HINTS[0]) === 'drag_block') return 'showDragHandHint';
      if (beat.hintType === 'press_play') return 'showPlayHandHint';
      return 'showDragHandHint';
    }

    function interactionToLegacyAction(interaction, prefix) {
      if (interaction === 'DOUBLE_TAP_BOKS') return `${prefix}BoksDoubleClick`;
      if (interaction === 'DRAG_BLOCK') return `${prefix}DragBlock`;
      if (interaction === 'PRESS_PLAY') return `${prefix}Play`;
      return '';
    }

    function normalizeInteractionList(interactions, mode = 'unlock') {
      const list = Array.isArray(interactions) ? interactions.filter(Boolean) : [];
      if (list.includes('ALL')) return ['DOUBLE_TAP_BOKS', 'DRAG_BLOCK', 'PRESS_PLAY'];
      if (!list.length && mode === 'lock') return ['DOUBLE_TAP_BOKS', 'DRAG_BLOCK', 'PRESS_PLAY'];
      return Array.from(new Set(list));
    }

    function buildSequenceStartSetupBeats(snapshot) {
      const beats = [];
      const visibleOrder = ['boks', 'forward_block', 'left_block', 'right_block', 'slot', 'play_button', 'goal'];
      visibleOrder.forEach((elementId, index) => {
        if (!snapshot.visibleElements.has(elementId)) return;
        beats.push({
          id: `setup-${index + 1}-${elementId}`,
          type: 'call',
          action: spawnActionForElement(elementId)
        });
      });
      if (snapshot.visibleElements.has('boks') && snapshot.boksOrientation !== 'right') {
        beats.push({
          id: `setup-boks-facing-${snapshot.boksOrientation}`,
          type: 'call',
          action: `setBoksOrientation${toPascalCase(snapshot.boksOrientation)}`
        });
      }
      normalizeInteractionList(Array.from(snapshot.unlockedInteractions), 'unlock').forEach((interaction, index) => {
        beats.push({
          id: `setup-unlock-${index + 1}-${interaction.toLowerCase()}`,
          type: 'call',
          action: interactionToLegacyAction(interaction, 'unlock')
        });
      });
      snapshot.mainProgram.forEach((blockType, index) => {
        if (!blockType) return;
        beats.push({
          id: `setup-program-main-${index + 1}-${blockType}`,
          type: 'call',
          action: 'setMainProgramSlot',
          target: `${index}:${blockType}`
        });
      });
      return beats;
    }

    function buildSequenceTransitionSetupBeats(previousSnapshot, currentSnapshot) {
      const beats = [];
      const visibleOrder = ['boks', 'forward_block', 'left_block', 'right_block', 'slot', 'play_button', 'goal'];
      visibleOrder.forEach((elementId, index) => {
        if (!currentSnapshot.visibleElements.has(elementId)) return;
        if (previousSnapshot.visibleElements.has(elementId)) return;
        beats.push({
          id: `setup-delta-${index + 1}-${elementId}`,
          type: 'call',
          action: spawnActionForElement(elementId)
        });
      });
      visibleOrder.forEach((elementId, index) => {
        if (!previousSnapshot.visibleElements.has(elementId)) return;
        if (currentSnapshot.visibleElements.has(elementId)) return;
        beats.push({
          id: `setup-delta-hide-${index + 1}-${elementId}`,
          type: 'call',
          action: 'hideElement',
          target: elementId
        });
      });
      if (
        currentSnapshot.visibleElements.has('boks')
        && currentSnapshot.boksOrientation !== previousSnapshot.boksOrientation
      ) {
        beats.push({
          id: `setup-delta-boks-facing-${currentSnapshot.boksOrientation}`,
          type: 'call',
          action: `setBoksOrientation${toPascalCase(currentSnapshot.boksOrientation)}`
        });
      }
      Array.from(currentSnapshot.unlockedInteractions).forEach((interaction, index) => {
        if (previousSnapshot.unlockedInteractions.has(interaction)) return;
        beats.push({
          id: `setup-delta-unlock-${index + 1}-${interaction.toLowerCase()}`,
          type: 'call',
          action: interactionToLegacyAction(interaction, 'unlock')
        });
      });
      Array.from(previousSnapshot.unlockedInteractions).forEach((interaction, index) => {
        if (currentSnapshot.unlockedInteractions.has(interaction)) return;
        beats.push({
          id: `setup-delta-lock-${index + 1}-${interaction.toLowerCase()}`,
          type: 'call',
          action: interactionToLegacyAction(interaction, 'lock')
        });
      });
      currentSnapshot.mainProgram.forEach((blockType, index) => {
        if (!blockType || previousSnapshot.mainProgram[index] === blockType) return;
        beats.push({
          id: `setup-delta-program-main-${index + 1}-${blockType}`,
          type: 'call',
          action: 'setMainProgramSlot',
          target: `${index}:${blockType}`
        });
      });
      return beats;
    }

    function getResolvedSequenceStartState(sequenceIndex, data = state.data) {
      const sequence = data?.sequences?.[sequenceIndex];
      return toSequenceSnapshot(sequence?.startState || createEmptySequenceStartState());
    }

    function deriveSequenceStartState(sequenceIndex, data = state.data) {
      if (sequenceIndex <= 0) return createEmptySequenceStartState();
      return snapshotToSequenceStartState(buildDerivedSequenceFinalSnapshot(sequenceIndex - 1, data));
    }

    function buildDerivedSequenceFinalSnapshot(sequenceIndex, data = state.data) {
      const sequence = data?.sequences?.[sequenceIndex];
      const snapshot = toSequenceSnapshot(sequence?.startState || createEmptySequenceStartState());
      const beats = Array.isArray(sequence?.beats) ? sequence.beats : [];
      beats.forEach(beat => applyBeatToDerivedFinalSnapshot(snapshot, beat));
      return snapshot;
    }

    function applyBeatToDerivedFinalSnapshot(snapshot, beat) {
      if (!beat || !snapshot) return;
      if (beat.type === 'Spawn') {
        const elementId = normalizeElementId(beat.elementId);
        if (!elementId) return;
        snapshot.visibleElements.add(elementId);
        if (elementId === 'boks') snapshot.boksOrientation = 'right';
        return;
      }
      if (beat.type === 'Hide') {
        const elementId = normalizeElementId(beat.elementId);
        if (!elementId) return;
        snapshot.visibleElements.delete(elementId);
        if (elementId === 'boks') {
          snapshot.unlockedInteractions.delete('DOUBLE_TAP_BOKS');
          snapshot.boksOrientation = 'right';
        }
        return;
      }
      if (beat.type === 'Unlock') {
        normalizeInteractionList(beat.interactions, 'unlock').forEach(interaction => snapshot.unlockedInteractions.add(interaction));
        return;
      }
      if (beat.type === 'Lock') {
        normalizeInteractionList(beat.interactions, 'lock').forEach(interaction => snapshot.unlockedInteractions.delete(interaction));
        return;
      }
      if (beat.type === 'Wait for event' && beat.eventName === 'BOKS_DOUBLE_TAPPED' && snapshot.visibleElements.has('boks')) {
        const turns = Math.max(1, Number(beat.minRepetitions) || 1);
        snapshot.boksOrientation = rotateOrientation(snapshot.boksOrientation, turns);
        return;
      }
      if (beat.type === 'Wait for event' && beat.eventName === 'BLOCK_DROPPED_IN_SLOT') {
        snapshot.mainProgram[0] = 'forward';
      }
    }

    function toSequenceSnapshot(startState) {
      const normalized = normalizeSequenceStartState(startState);
      return {
        visibleElements: new Set(normalized.visibleElements),
        unlockedInteractions: new Set(normalized.unlockedInteractions),
        boksOrientation: normalized.boksOrientation,
        mainProgram: normalized.mainProgram.slice()
      };
    }

    function snapshotToSequenceStartState(snapshot) {
      return normalizeSequenceStartState({
        visibleElements: Array.from(snapshot.visibleElements || []),
        unlockedInteractions: Array.from(snapshot.unlockedInteractions || []),
        boksOrientation: snapshot.boksOrientation || 'right',
        mainProgram: Array.isArray(snapshot.mainProgram) ? snapshot.mainProgram : []
      });
    }

    function normalizeProgramBlock(value) {
      const block = String(value || '').trim().toLowerCase();
      return PROGRAM_SLOT_OPTIONS.includes(block) ? block : '';
    }

    function normalizeElementId(elementId) {
      const id = String(elementId || '').trim().toLowerCase();
      if (id === 'bocs') return 'boks';
      if (id === 'forward' || id === 'move_forward') return 'forward_block';
      if (id === 'left' || id === 'turn_left') return 'left_block';
      if (id === 'right' || id === 'turn_right') return 'right_block';
      if (id === 'play') return 'play_button';
      return id;
    }

    function rotateOrientation(orientation, turns) {
      const order = ['right', 'down', 'left', 'up'];
      const startIndex = Math.max(0, order.indexOf(orientation));
      return order[(startIndex + turns) % order.length];
    }

    function spawnActionForElement(elementId) {
      const id = String(elementId || '').toLowerCase();
      if (id === 'boks' || id === 'bocs') return 'revealBoks';
      if (id === 'forward_block' || id === 'forward' || id === 'move_forward') return 'revealForwardBlock';
      if (id === 'left_block' || id === 'left' || id === 'turn_left') return 'revealLeftBlock';
      if (id === 'right_block' || id === 'right' || id === 'turn_right') return 'revealRightBlock';
      if (id === 'slot') return 'revealSlot';
      if (id === 'play_button' || id === 'play') return 'revealPlayButton';
      if (id === 'goal') return 'revealGoal';
      return `reveal${toPascalCase(id || 'element')}`;
    }

    function legacyEventName(beat) {
      if (beat.completionCondition === 'BOKS_FACING_INITIAL_ORIENTATION') return 'boks-facing-start';
      if (beat.eventName === 'BOKS_DOUBLE_TAPPED') return 'boks-turned';
      if (beat.eventName === 'BLOCK_RELEASED_WITHOUT_SLOT') return 'block-drop-failed';
      if (beat.eventName === 'BLOCK_DROPPED_IN_SLOT') return 'block-dropped';
      if (beat.eventName === 'PLAY_PRESSED') return 'play-pressed';
      if (beat.eventName === 'PROGRAM_EXECUTION_FINISHED') return 'execution-finished';
      return String(beat.eventName || '')
        .toLowerCase()
        .replace(/_/g, '-');
    }

    function legacyBeatId(beat, index) {
      const base = beat.caption || beat.elementId || beat.eventName || beat.type || 'beat';
      const sequenceLabel = typeof index === 'number'
        ? String(index + 1).padStart(2, '0')
        : String(index).replace(/[^a-z0-9]+/gi, '-').replace(/^-+|-+$/g, '') || 'beat';
      const slug = String(base)
        .toLowerCase()
        .replace(/['’]/g, '')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 42) || 'beat';
      return `${sequenceLabel}-${slug}`;
    }

    function toPascalCase(value) {
      return String(value)
        .split(/[^a-z0-9]+/i)
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join('');
    }

    function stripInternalFields(beat) {
      const copy = { ...beat };
      if (copy.type === 'Narration') {
        const hasLocalAudio = !!state.audioAttachments.get(copy._editorId) || isLocalAudioPath(copy.audioSource) || !!copy.audioDraftBase64;
        const hasUrlAudio = /^https?:\/\//i.test(copy.audioSource || '');
        const hasExportedAudio = /^\/?assets\//i.test(copy.audioSource || '');
        if (hasLocalAudio && copy.audioFilename) copy.audioSrc = `assets/audio/sfx/gameplay/${copy.audioFilename}`;
        else if (hasUrlAudio) copy.audioSrc = copy.audioSource;
        else if (hasExportedAudio) copy.audioSrc = copy.audioSource.replace(/^\//, '');
        else if (copy.audioFilename) copy.audioSrc = `assets/audio/sfx/gameplay/${copy.audioFilename}`;
      }
      delete copy.notes;
      delete copy.audioFilename;
      delete copy.audioFilenameEdited;
      delete copy.audioSource;
      delete copy.audioDisplayName;
      delete copy.audioDraftDataUrl;
      delete copy.audioDraftBase64;
      delete copy.audioDraftMimeType;
      delete copy.audioLoadFailed;
      delete copy._editorId;
      return copy;
    }

    async function collectAudioExportFiles() {
      const files = [];
      state.data.sequences.forEach(sequence => {
        sequence.beats.forEach(beat => {
          if (beat.type !== 'Narration' || !beat.audioFilename) return;
          const attachment = state.audioAttachments.get(beat._editorId);
          if (attachment?.file) {
            files.push({
              filename: beat.audioFilename,
              file: attachment.file
            });
            return;
          }
          if (beat.audioDraftBase64) {
            files.push({
              filename: beat.audioFilename,
              base64: beat.audioDraftBase64
            });
            return;
          }
          if (isLocalAudioPath(beat.audioSource)) {
            files.push({
              filename: beat.audioFilename,
              path: beat.audioSource
            });
          }
        });
      });
      const encoded = [];
      for (const item of files) {
        if (item.file) {
          encoded.push({
            filename: item.filename,
            base64: await fileToBase64(item.file)
          });
        } else {
          encoded.push(item);
        }
      }
      return encoded;
    }

    function isLocalAudioPath(value) {
