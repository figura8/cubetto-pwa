      return !!value && !/^https?:\/\//i.test(value) && !/^\/?assets\//i.test(value);
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(',')[1] || '');
        reader.onerror = () => reject(reader.error);
        reader.readAsDataURL(file);
      });
    }

    function estimateSequenceDuration(sequence) {
      return sequence.beats.reduce((total, beat) => total + getBeatDuration(beat), 0);
    }

    function getBeatDuration(beat) {
      if (beat.type === 'Narration') return Number(beat.durationMs) || 0;
      if (beat.type === 'Pause') return Number(beat.durationMs) || 0;
      if (beat.type === 'Spawn') return (Number(beat.delayMs) || 0) + (Number(beat.durationMs) || 0);
      if (beat.type === 'Hide') return Number(beat.durationMs) || 0;
      return 0;
    }

    function getBeatColor(type) {
      const meta = BEAT_TYPES.find(entry => entry.type === type);
      return meta?.color || '#999';
    }

    function previewBeat(beat) {
      if (beat.type === 'Narration') return beat.caption || 'Empty caption';
      if (beat.type === 'Pause') return `${beat.durationMs || 0} ms`;
      if (beat.type === 'Spawn') return `${beat.elementId || 'element'} via ${beat.transition}`;
      if (beat.type === 'Hide') return `${beat.elementId || 'element'} via ${beat.transition}`;
      if (beat.type === 'Highlight') return beat.elementId || 'element';
      if (beat.type === 'Clear highlight') return 'Stop current highlight';
      if (beat.type === 'Hand hint') return beat.hintType || HAND_HINTS[0];
      if (beat.type === 'Clear hand hint') return 'Stop hand hint';
      if (beat.type === 'Lock') return 'Lock interactions';
      if (beat.type === 'Unlock') return (beat.interactions || []).join(', ') || 'No interactions';
      return `${beat.eventName || EVENTS[0]} x${beat.minRepetitions || 1}`;
    }

    function persistDraft() {
      state.lastDraftSavedAt = Date.now();
      try {
        const draftSource = JSON.stringify(buildEditorDraftData());
        window.localStorage.setItem(STORAGE_KEY_V2, draftSource);
        window.localStorage.removeItem(STORAGE_KEY);
        state.lastDraftByteSize = draftSource.length;
      } catch (err) {
        els.exportStatus.textContent = `Draft save failed: ${err.message}`;
      }
    }

    function buildEditorDraftData() {
      return {
        sequences: state.data.sequences.map(sequence => ({
          ...sequence,
          beats: sequence.beats.map(beat => {
            const copy = { ...beat };
            if (copy.type === 'Narration' && !copy.audioSource && copy.audioFilename) {
              copy.audioSource = getRepoAudioPath(copy);
            }
            delete copy.audioDraftDataUrl;
            delete copy.audioDraftBase64;
            delete copy.audioDraftMimeType;
            delete copy.audioLoadFailed;
            return copy;
          })
        }))
      };
    }

    function saveDraftNow() {
      normalizeEditorData();
      persistDraft();
      state.dataSource = 'draft';
      renderDraftStatus();
      els.exportStatus.textContent = `Editor draft saved locally (${state.lastDraftByteSize || 0} bytes).`;
    }

    async function loadInitialData() {
      await loadRepoAudioFiles();
      const draft = loadStoredDraft();
      if (draft?.sequences?.length) {
        state.data = draft;
        state.dataSource = 'draft';
        state.lastDraftSavedAt = Date.now();
        await autoLinkRepoAudio();
        render();
        return;
      }
      const fromServer = await loadExistingTypeScript();
      if (fromServer) {
        state.data = fromServer;
        state.dataSource = 'repo';
        await autoLinkRepoAudio();
        render();
        return;
      }
      state.dataSource = 'default';
      await autoLinkRepoAudio();
      render();
    }

    function loadStoredDraft() {
      const keys = [STORAGE_KEY_V2, STORAGE_KEY];
      for (const key of keys) {
        try {
          const raw = window.localStorage.getItem(key);
          if (!raw) continue;
          const draft = JSON.parse(raw);
          if (draft?.sequences?.length) return draft;
        } catch (_err) {}
      }
      return null;
    }

    async function loadRepoAudioFiles() {
      try {
        const res = await fetch('/dev/tutorial-editor/api/audio-files', { cache: 'no-store' });
        if (!res.ok) {
          state.repoAudioFiles = [];
          return;
        }
        const repoFiles = await res.json();
        state.repoAudioFiles = Array.isArray(repoFiles) ? repoFiles.slice().sort((a, b) => a.localeCompare(b)) : [];
      } catch (_err) {
        state.repoAudioFiles = [];
      }
    }

    async function autoLinkRepoAudio() {
      if (!state.repoAudioFiles.length) return;
      const fileSet = new Set(state.repoAudioFiles.map(f => f.toLowerCase()));
      for (const sequence of state.data.sequences) {
        for (const beat of sequence.beats) {
          if (beat.type !== 'Narration') continue;
          withEditorDefaults(beat);
          const src = beat.audioSource || beat.audioSrc || getRepoAudioPath(beat) || '';
          if (!src) continue;
          const filename = src.split('/').pop();
          if (!fileSet.has(filename.toLowerCase())) continue;
          state.audioAttachments.delete(beat._editorId);
          beat.audioFilename = filename;
          beat.audioFilenameEdited = true;
          beat.audioSource = `assets/audio/sfx/gameplay/${filename}`;
          beat.audioDisplayName = filename;
          beat.audioLoadFailed = false;
        }
      }
    }

    async function loadExistingTypeScript() {
      const urls = [
        '/dev/tutorial-editor/api/tutorial-data',
        '../../src/tutorial/tutorialData.ts'
      ];
      for (const url of urls) {
        try {
          const response = await fetch(url, { cache: 'no-store' });
          if (!response.ok) continue;
          const text = await response.text();
          const parsed = parseTutorialDataSource(text);
          if (parsed?.sequences?.length) return parsed;
        } catch (_err) {}
      }
      return null;
    }

    function parseTutorialDataSource(source) {
      const match = /export\s+const\s+tutorialData\s*=\s*([\s\S]*?)\s+as\s+const\s*;/.exec(source);
      if (!match) return null;
      try {
        return JSON.parse(match[1]);
      } catch (_err) {
        return null;
      }
    }

    function clone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      })[ch]);
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, '&#096;');
    }

    document.getElementById('exportBtn').addEventListener('click', exportTutorialData);
    document.getElementById('saveDraftBtn').addEventListener('click', saveDraftNow);
    document.getElementById('duplicateBtn').addEventListener('click', duplicateBeat);
    document.getElementById('deleteSelectedBtn').addEventListener('click', () => deleteBeat());
    document.getElementById('previewBtn').addEventListener('click', () => previewSequence('current'));
    document.getElementById('previewAllBtn').addEventListener('click', () => previewSequence('all'));

    loadInitialData();
  </script>
</body>
</html>
