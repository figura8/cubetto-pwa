<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#e8dfcc"/>
  <title>BÖKS</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&family=Lilita+One&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/boks-apple-touch-icon.png">
  <style>
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      -webkit-tap-highlight-color: transparent; user-select: none;
    }
    :root {
      --app-vh: 100dvh;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --bg-base: #e8dfcc;
      --panel-bg: #ede7d7;
      --panel-edge: #d2c9b4;
      --grid-bg: #f3eedf;
      --cell-bg: #efead9;
      --cell-edge: #d9cfb8;
      --toy-red: #f51c24;
      --toy-green: #00aa50;
      --toy-blue: #005abd;
      --toy-yellow: #fdb515;
      --toy-purple: #9e44ad;
      --toy-orange: #e57e22;
    }
    html, body {
      width: 100%; height: 100%;
      min-height: var(--app-vh);
      overflow: hidden;
      background: radial-gradient(120% 80% at 50% 0%, #f4efdf 0%, var(--bg-base) 72%);
      font-family: 'Fredoka', system-ui, sans-serif;
    }

    #app {
      position: fixed;
      left: 0; right: 0; top: 0;
      height: var(--app-vh);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: calc(6px + var(--safe-top)) 12px calc(12px + var(--safe-bottom));
      gap: 8px;
      max-width: 520px;
      margin: 0 auto;
    }

    /* Header BÖKS */
    #header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 1px;
      letter-spacing: 0.5px;
    }
    .logo-letter {
      font-family: 'Lilita One', cursive;
      font-size: 1.62em;
      line-height: 1;
      display: inline-block;
      -webkit-text-stroke: 0.8px rgba(86, 64, 34, 0.35);
      text-shadow: 0 2px 0 rgba(130, 101, 56, 0.42), 0 4px 7px rgba(88, 64, 31, 0.2);
      transform: translateY(-0.5px);
    }
    .logo-b {
      color: #e53a32;
    }
    .logo-o {
      color: #d8a300;
    }
    .logo-k {
      color: #2fa64c;
    }
    .logo-s {
      color: #2d84c9;
    }

    #gridWrap {
      position: relative;
      width: 100%;
      max-width: 460px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      overflow: hidden;
      background: var(--panel-bg);
      border: 2px solid var(--panel-edge);
      box-shadow: 0 2px 0 #cdc2ab, 0 8px 14px rgba(95, 78, 52, 0.18);
    }

    #gameGrid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 4px;
      position: relative;
      flex-shrink: 0;
      padding: 6px;
      background: var(--grid-bg);
      border-radius: 16px;
      border: 1px solid #dfd5bf;
    }
    .cell {
      background: var(--cell-bg);
      border: 1px solid var(--cell-edge);
      border-radius: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), inset 0 -1px 0 rgba(190,172,139,0.35);
    }
    .cell.hi {
      background: #f7e59f;
      border-color: #e1b842;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.78), 0 0 0 1px rgba(225,184,66,0.45);
    }

    #sprite {
      position: absolute;
      z-index: 20;
      touch-action: none;
      cursor: grab;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.18));
    }
    #sprite:active { cursor: grabbing; }
    #sprite.moving { animation: wg .18s linear infinite; }
    @keyframes wg {
      0%,100% { transform: rotate(0deg); }
      30%      { transform: rotate(-3deg) translateY(-1px); }
      70%      { transform: rotate(3deg)  translateY(-1px); }
    }

    #bottom {
      width: 100%;
      max-width: 460px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    /* Available blocks row */
    #blocksRow {
      width: 100%;
      background: var(--panel-bg);
      border: 2px solid var(--panel-edge);
      border-radius: 16px;
      padding: 10px 14px;
      display: flex;
      justify-content: space-evenly;
      align-items: center;
      box-shadow: 0 2px 0 #cdc2ab, 0 7px 14px rgba(95, 78, 52, 0.12), inset 0 1px 0 rgba(255,255,255,0.72);
    }
    .ablock {
      flex-shrink: 0;
      touch-action: none;
      cursor: grab;
      border-radius: 7px;
      filter: drop-shadow(0 3px 0 rgba(96, 75, 40, 0.3)) drop-shadow(0 6px 8px rgba(0,0,0,0.13));
      transition: transform .12s, filter .12s;
    }
    .ablock:active {
      transform: translateY(1px) scale(0.96);
      filter: drop-shadow(0 2px 0 rgba(96, 75, 40, 0.28)) drop-shadow(0 4px 7px rgba(0,0,0,0.12));
    }

    /* Program board */
    #boardRow {
      width: 100%;
      background: var(--panel-bg);
      border: 2px solid var(--panel-edge);
      border-radius: 16px;
      padding: 10px;
      position: relative;
      box-shadow: 0 2px 0 #cdc2ab, 0 8px 14px rgba(95, 78, 52, 0.12), inset 0 1px 0 rgba(255,255,255,0.74);
    }
    #boardGrid {
      position: relative;
      width: 100%;
    }
    #boardTrack {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: visible;
    }
    #boardSlots {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
    }
    .board-row { display: flex; }
    .board-row.reverse { flex-direction: row-reverse; }

    .pslot {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      padding: 4px 2px 5px;
      touch-action: none;
      border-radius: 10px;
      background: #ddc29b;
      transition: background .2s, box-shadow .2s;
      position: relative;
      margin: 0 1px;
      border: 1px solid #c6a67a;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), inset 0 -2px 0 rgba(158,121,72,0.2);
    }
    .pslot.over    { background: #e7cb9f; border-color: #b98a4e; }
    .pslot.done    { background: #d5bb93; }
    .pslot.done .dot { background: #a7773a; box-shadow: 0 0 4px rgba(167,119,58,0.45); }
    .pslot.active  {
      background: #c6e3ff;
      animation: slotPulse .7s ease-in-out infinite;
    }
    .pslot.active .dot {
      background: var(--toy-blue);
      box-shadow: 0 0 6px rgba(43,143,212,0.9);
      animation: bd .6s infinite;
    }
    @keyframes slotPulse {
      0%,100% { box-shadow: 0 0 6px rgba(43,143,212,0.2); }
      50%      { box-shadow: 0 0 14px rgba(43,143,212,0.5); }
    }
    .slot-arrow { font-size: 10px; color: rgba(130,92,45,0.55); line-height: 1; }
    @keyframes bd { 0%,100%{transform:scale(1)} 50%{transform:scale(1.7)} }
    .sinner { display:flex; align-items:center; justify-content:center; }
    .pblock {
      border-radius: 7px; touch-action: none; cursor: grab;
      filter: drop-shadow(0 3px 0 rgba(96, 75, 40, 0.32)) drop-shadow(0 6px 8px rgba(0,0,0,0.14));
    }
    .dot { width: 5px; height: 5px; background: rgba(132,91,41,0.45); border-radius: 50%; flex-shrink: 0; transition: all .2s; }

    /* fn slot states */
    .pslot.fn-active {
      background: #e2d0f0;
      animation: slotPulseFn .7s ease-in-out infinite;
    }
    .pslot.fn-active .dot { background: var(--toy-purple); box-shadow: 0 0 6px rgba(124,58,237,0.75); animation: bd .6s infinite; }
    .pslot.fn-done { background: #d5bee6; }
    .pslot.fn-done .dot { background: #7C3AED; box-shadow: 0 0 4px rgba(124,58,237,0.5); }
    @keyframes slotPulseFn {
      0%,100% { box-shadow: 0 0 6px rgba(124,58,237,0.2); }
      50%      { box-shadow: 0 0 14px rgba(124,58,237,0.6); }
    }

    /* Run button - toy plastic style */
    #runBtn {
      width: 52px; height: 52px;
      flex-shrink: 0;
      border-radius: 13px;
      border: 2px solid #d59d00;
      outline: none;
      background: linear-gradient(180deg, #ffd538 0%, #fdb515 100%);
      box-shadow: 0 3px 0 #c78300, 0 7px 12px rgba(92, 66, 19, 0.26);
      display: flex; align-items: flex-start; justify-content: center;
      cursor: pointer;
      touch-action: manipulation;
      transition: 0.1s ease-in-out;
      -webkit-appearance: none;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
      padding: 8px 0 0 0;
    }
    #runBtn svg {
      transition: 0.1s ease-in-out;
      flex-shrink: 0;
      filter: drop-shadow(0 1px 0 rgba(255,255,255,0.35));
    }
    #runBtn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #c78300, 0 4px 8px rgba(92, 66, 19, 0.2);
    }
    #runBtn:active svg { transform: translateY(1px); }
    #runBtn.running { animation: pb 1s ease-in-out infinite; }
    @keyframes pb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }

    #ghost {
      position: fixed; z-index: 9999;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(1.15);
      opacity: .9; display: none; border-radius: 5px;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.25));
    }

    #toast {
      position: fixed;
      left: 50%; transform: translateX(-50%);
      background: #fff9ea; border-radius: 20px;
      padding: 6px 16px; font-size: .85em; font-weight: 700;
      color: #5f4e34;
      border: 1px solid #dfcda9;
      box-shadow: 0 4px 16px rgba(0,0,0,.12);
      opacity: 0; transition: opacity .3s;
      pointer-events: none; white-space: nowrap; z-index: 200;
    }
    #toast.show { opacity: 1; }
    #toast.win  {
      color: #e0a000;
      font-size: 1.6em;
      padding: 12px 28px;
      background: #fffbe6;
      box-shadow: 0 6px 24px rgba(255,200,0,0.3);
    }
    @keyframes starPulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      50%      { transform: translate(-50%,-50%) scale(1.18); }
    }
    .cell.goal-cell svg { animation: starPulse 1.6s ease-in-out infinite; }

    /* ── Splash screen ── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg-base);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      transition: opacity 0.5s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }

    #splash-logo {
      display: flex; align-items: center; gap: 2px;
      animation: splashBounce 0.7s cubic-bezier(0.36,0.07,0.19,0.97) forwards;
      transform: scale(0);
    }
    #splash-logo span {
      font-family: 'Lilita One', cursive, Arial Black, sans-serif;
      font-size: min(22vw, 110px);
      line-height: 1;
      display: inline-block;
    }

    #splash-turtle {
      margin-top: 12px;
      opacity: 0;
      transform: scale(0.5) translateY(20px);
      animation: turtlePop 0.4s ease forwards 0.85s;
    }

    @keyframes splashBounce {
      0%   { transform: scale(0) rotate(-8deg); opacity:0; }
      60%  { transform: scale(1.18) rotate(3deg); opacity:1; }
      78%  { transform: scale(0.93) rotate(-1deg); }
      90%  { transform: scale(1.06) rotate(1deg); }
      100% { transform: scale(1) rotate(0deg); opacity:1; }
    }
    @keyframes turtlePop {
      0%   { opacity:0; transform: scale(0.5) translateY(20px); }
      70%  { transform: scale(1.12) translateY(-4px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }
  </style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">
  <div id="splash-logo">
    <span style="color:#E8302A;text-shadow:0 5px 0 #9a1208;">B</span><span style="color:#F47E20;text-shadow:0 5px 0 #a04800;">Ö</span><span style="color:#4CAF3F;text-shadow:0 5px 0 #2d6e26;">K</span><span style="color:#2B8FD4;text-shadow:0 5px 0 #1a5a8a;">S</span>
  </div>
  <div id="splash-turtle">
    <svg width="90" height="80" viewBox="0 0 72 72">
      <ellipse cx="24" cy="20" rx="7" ry="5" fill="#4CAF3F" transform="rotate(-30 24 20)"/>
      <ellipse cx="24" cy="52" rx="7" ry="5" fill="#4CAF3F" transform="rotate(30 24 52)"/>
      <ellipse cx="40" cy="20" rx="7" ry="5" fill="#4CAF3F" transform="rotate(30 40 20)"/>
      <ellipse cx="40" cy="52" rx="7" ry="5" fill="#4CAF3F" transform="rotate(-30 40 52)"/>
      <ellipse cx="32" cy="36" rx="18" ry="14" fill="#4CAF3F"/>
      <ellipse cx="32" cy="36" rx="13" ry="9" fill="#3a8a2e"/>
      <ellipse cx="32" cy="36" rx="8" ry="5" fill="#4CAF3F"/>
      <line x1="32" y1="27" x2="32" y2="45" stroke="#3a8a2e" stroke-width="1.5"/>
      <line x1="19" y1="36" x2="45" y2="36" stroke="#3a8a2e" stroke-width="1.5"/>
      <line x1="23" y1="29" x2="41" y2="43" stroke="#3a8a2e" stroke-width="1"/>
      <line x1="41" y1="29" x2="23" y2="43" stroke="#3a8a2e" stroke-width="1"/>
      <ellipse cx="52" cy="36" rx="8" ry="7" fill="#4CAF3F"/>
      <ellipse cx="52" cy="36" rx="6" ry="5" fill="#5abf4a"/>
      <circle cx="55" cy="33" r="1.8" fill="#222"/>
      <circle cx="55.6" cy="32.4" r="0.6" fill="#fff"/>
      <ellipse cx="16" cy="36" rx="5" ry="3" fill="#4CAF3F"/>
    </svg>
  </div>
</div>
  <div id="app">
  <!-- BÖKS header -->
  <div id="header">
    <span class="logo-letter logo-b">B</span><span class="logo-letter logo-o">Ö</span><span class="logo-letter logo-k">K</span><span class="logo-letter logo-s">S</span>
  </div>
  <!-- Row 1: grid (flexible) -->
  <div id="gridWrap">
    <canvas id="bgCanvas" style="position:absolute;inset:0;pointer-events:none;border-radius:7px;"></canvas>
    <div id="gameGrid"></div>
    <div id="sprite"></div>
  </div>

  <!-- Row 2: fixed bottom section -->
  <div id="bottom">
    <div id="blocksRow"></div>
    <div id="boardRow"><div id="boardGrid"></div></div>
    <button id="runBtn" onclick="run()" onmousedown="this.blur()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <polygon points="7,4 21,12 7,20" fill="#111111"/>
      </svg>
    </button>
  </div>
</div>
<div id="ghost"></div>
<div id="toast"></div>

<script>
// ═══ CONSTANTS ═══
const COLS = 6, ROWS = 6, SLOTS = 8, FSLOTS = 4;
let GOAL = {x:5,y:5};
const START = {x:2,y:2};

// ── Goal SVG: mattoncino BÖKS da raccogliere ──
function goalSVG() {
  return `<svg viewBox="0 0 50 50" style="width:72%;height:72%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);filter:drop-shadow(0 2px 4px rgba(0,0,0,0.18));">
    <!-- stud sopra -->
    <ellipse cx="20" cy="10" rx="5" ry="3.5" fill="#d4880a"/>
    <ellipse cx="20" cy="8"  rx="5" ry="3.5" fill="#F5C400"/>
    <ellipse cx="32" cy="10" rx="5" ry="3.5" fill="#d4880a"/>
    <ellipse cx="32" cy="8"  rx="5" ry="3.5" fill="#F5C400"/>
    <!-- lato superiore 3D -->
    <polygon points="8,12 26,6 42,12 24,18" fill="#ffd730"/>
    <!-- lato destro 3D -->
    <polygon points="42,12 42,36 24,36 24,18" fill="#c07e00" opacity="0.55"/>
    <!-- faccia frontale -->
    <rect x="8" y="12" width="34" height="24" rx="5" fill="#F5C400"/>
    <!-- highlight -->
    <rect x="10" y="14" width="30" height="8" rx="3" fill="rgba(255,255,255,0.22)"/>
    <!-- bordo -->
    <rect x="8" y="12" width="34" height="24" rx="5" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
    <!-- puntini decorativi -->
    <circle cx="19" cy="27" r="3" fill="rgba(255,255,255,0.35)"/>
    <circle cx="31" cy="27" r="3" fill="rgba(255,255,255,0.35)"/>
  </svg>`;
}

function moveGoal() {
  const old = document.querySelector('.goal-cell');
  if(old) { old.classList.remove('goal-cell'); old.innerHTML = ''; old.style.position=''; old.style.overflow=''; }
  let nx, ny, attempts = 0;
  do {
    nx = Math.floor(Math.random()*COLS);
    ny = Math.floor(Math.random()*ROWS);
    attempts++;
  } while(
    attempts < 100 &&
    (Math.abs(nx-pos.x)+Math.abs(ny-pos.y) < 3 ||
     (nx===START.x && ny===START.y))
  );
  GOAL = {x:nx, y:ny};
  const cell = document.querySelector(`.cell[data-cx="${nx}"][data-cy="${ny}"]`);
  if(cell) {
    cell.classList.add('goal-cell');
    cell.innerHTML = goalSVG();
    cell.style.position = 'relative';
    cell.style.overflow = 'hidden';
  }
}
let ori = 'right';
const MOVE_MS = 650, TURN_MS = 320, STEP_MS = 380;
const POOL = {
  forward:  {dir:'forward',  color:'#5BC85A', dark:'#3a8a39', light:'#8de88c'},
  left:     {dir:'left',     color:'#F5C842', dark:'#b8920a', light:'#ffe87a'},
  right:    {dir:'right',    color:'#E8504A', dark:'#a02820', light:'#ff8a84'},
  function: {dir:'function', color:'#9B6FE8', dark:'#5c2eb0', light:'#c8a8ff'}
};

// ═══ STATE ═══
let pos = {...START};
let running = false, animating = false, idN = 0;
const avail = ['forward','left','right','function'].map((d,i) => ({id:`${d}${i}`, ...POOL[d]}));
const prog  = Array(SLOTS).fill(null);
const fnProg = Array(FSLOTS).fill(null);

// ═══ AUDIO ═══
let ac;
const AC = () => { if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); if(ac.state==='suspended') ac.resume(); return ac; };
function T(f,t,s,d,v=.12) {
  const c=AC(),o=c.createOscillator(),g=c.createGain();
  o.type=t; o.frequency.setValueAtTime(f,c.currentTime+s);
  g.gain.setValueAtTime(v,c.currentTime+s);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+s+d);
  o.connect(g); g.connect(c.destination);
  o.start(c.currentTime+s); o.stop(c.currentTime+s+d+.05);
}
const sStep  = () => { T(440,'sine',0,.06,.08); };
const sErr   = () => { T(300,'sine',0,.18,.2); T(180,'sine',.2,.22,.18); };
function sWin() {
  // Melodia dolce — arpeggio carino
  [[523,0],[659,.12],[784,.24],[1047,.38],[659,.52],[784,.64],[1047,.78],[1319,.94]].forEach(([f,s])=>{
    T(f,'sine',s,.35,.14);
    T(f*2,'sine',s,.2,.04);
  });
}

// ═══ UTILS ═══
const sleep = ms => new Promise(r => setTimeout(r, ms));
function syncViewportHeight() {
  const h = window.visualViewport ? Math.round(window.visualViewport.height) : window.innerHeight;
  document.documentElement.style.setProperty('--app-vh', `${h}px`);
}
async function requestAppFullscreen() {
  if (document.fullscreenElement) return;
  const el = document.documentElement;
  try {
    if (el.requestFullscreen) await el.requestFullscreen({ navigationUI: 'hide' });
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  } catch (_) {}
  // blocca orientamento portrait su Android
  try {
    if (screen.orientation?.lock) await screen.orientation.lock('portrait');
  } catch (_) {}
}
function toast(msg, cls='', aboveEl=null) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = msg ? 'show '+cls : '';
  if(aboveEl && msg) {
    const r = aboveEl.getBoundingClientRect();
    el.style.top  = (r.top - 60) + 'px';
    el.style.bottom = '';
    el.style.left = (r.left + r.width/2) + 'px';
  } else {
    el.style.top = '';
    el.style.bottom = '70px';
    el.style.left = '50%';
  }
  clearTimeout(el._t); if(msg) el._t = setTimeout(() => el.className='', 3000);
}

// ═══ CLIP PATHS ═══
const clip = dir =>
  dir==='forward' ? 'polygon(0 10%,80% 10%,100% 50%,80% 90%,0 90%)' :
  dir==='left'    ? 'polygon(50% 0,100% 32%,100% 100%,0 100%,0 32%)' :
                    'polygon(0 0,100% 0,100% 68%,50% 100%,0 68%)';

// ═══ BUILD BLOCK ═══
function mkB(block, w, h, cls='') {
  const el = document.createElement('div');
  el.className = cls;
  el.dataset.dir = block.dir || block.direction;
  el.dataset.bid = block.id;
  const dir = el.dataset.dir;
  el.style.cssText = `width:${w}px;height:${h}px;flex-shrink:0;display:flex;align-items:center;justify-content:center;`;

  const c  = block.color;
  const dk = block.dark  || '#666';
  const lt = block.light || '#fff';

  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('viewBox','0 0 40 32');
  svg.setAttribute('width', w); svg.setAttribute('height', h);

  const shape = {
    forward:  `M4,8 Q4,4 8,4 L32,4 Q38,4 38,10 L38,22 Q38,28 32,28 L8,28 Q4,28 4,24 Z`,
    left:     `M20,4 L36,4 Q40,4 40,8 L40,28 L4,28 L4,8 Q4,4 8,4 Z`,
    right:    `M4,4 L36,4 Q40,4 40,8 L40,28 L4,28 L4,8 Q4,4 4,4 Z`,
    function: `M4,8 Q4,4 8,4 L32,4 Q36,4 36,8 L36,24 Q36,28 32,28 L8,28 Q4,28 4,24 Z`,
  };

  // ombra
  const shadow = document.createElementNS('http://www.w3.org/2000/svg','path');
  shadow.setAttribute('d', shape[dir] || shape.forward);
  shadow.setAttribute('fill', dk);
  shadow.setAttribute('transform','translate(0,3)');
  svg.appendChild(shadow);

  // corpo
  const body = document.createElementNS('http://www.w3.org/2000/svg','path');
  body.setAttribute('d', shape[dir] || shape.forward);
  body.setAttribute('fill', c);
  svg.appendChild(body);

  // highlight
  const hi = document.createElementNS('http://www.w3.org/2000/svg','path');
  hi.setAttribute('d', shape[dir] || shape.forward);
  hi.setAttribute('fill', lt);
  hi.setAttribute('opacity','0.35');
  hi.setAttribute('clip-path','inset(0 0 55% 0)');
  svg.appendChild(hi);

  // simbolo piccolo — centrato nel blocco, scala ridotta
  const symG = document.createElementNS('http://www.w3.org/2000/svg','g');
  symG.setAttribute('transform','translate(20,16) scale(0.42) translate(-20,-16)');

  if(dir === 'function') {
    const c1 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c1.setAttribute('cx','14'); c1.setAttribute('cy','16'); c1.setAttribute('r','6');
    c1.setAttribute('fill','rgba(255,255,255,0.88)');
    const c2 = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c2.setAttribute('cx','26'); c2.setAttribute('cy','16'); c2.setAttribute('r','6');
    c2.setAttribute('fill','rgba(255,255,255,0.88)');
    symG.appendChild(c1); symG.appendChild(c2);
  } else {
    const paths = {
      forward: `M8,16 H24 M22,10 L32,16 L22,22`,
      left:    `M28,9 Q28,23 13,23 M9,19 L13,27 L17,19`,
      right:   `M12,9 Q12,23 27,23 M23,19 L27,27 L31,19`,
    };
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', paths[dir]);
    p.setAttribute('fill','none');
    p.setAttribute('stroke','rgba(255,255,255,0.88)');
    p.setAttribute('stroke-width','4');
    p.setAttribute('stroke-linecap','round');
    p.setAttribute('stroke-linejoin','round');
    symG.appendChild(p);
  }
  svg.appendChild(symG);

  el.appendChild(svg);
  return el;
}

// ═══ SIZE THE GRID AS A SQUARE ═══
function sizeGrid() {
  const wrap  = document.getElementById('gridWrap');
  const grid  = document.getElementById('gameGrid');
  const app   = document.getElementById('app');
  const bot   = document.getElementById('bottom');

  // Measure what bottom actually needs
  const appH  = app.clientHeight;
  const botH  = bot.offsetHeight;
  const availH = appH - botH - 6 - 6 - 6; // gaps + padding
  const availW = wrap.clientWidth;
  const sq = Math.floor(Math.min(availH, availW));

  grid.style.width  = sq + 'px';
  grid.style.height = sq + 'px';
  wrap.style.height = sq + 'px'; // shrink wrap to exact grid size, no extra space
}

function cellPos(x, y) {
  const cell = document.querySelector(`.cell[data-cx="${x}"][data-cy="${y}"]`);
  const wrap = document.getElementById('gridWrap');
  if(!cell || !wrap) return null;
  const cr = cell.getBoundingClientRect(), wr = wrap.getBoundingClientRect();
  return { l: cr.left-wr.left, t: cr.top-wr.top, w: cr.width, h: cr.height };
}

function syncSprite() {
  const r = cellPos(pos.x, pos.y);
  const s = document.getElementById('sprite');
  if(!r || !s) return;
  s.style.left = r.l+'px'; s.style.top = r.t+'px';
  s.style.width = r.w+'px'; s.style.height = r.h+'px';
  s.innerHTML = svgRobot(ori);
}

async function animTo(tx, ty) {
  if(animating) return;
  animating = true;
  const s = document.getElementById('sprite');
  const fr = cellPos(pos.x,pos.y), to = cellPos(tx,ty);
  if(!fr||!to) { pos={x:tx,y:ty}; syncSprite(); animating=false; return; }
  s.classList.add('moving');
  const a = s.animate(
    [{left:fr.l+'px',top:fr.t+'px'},{left:to.l+'px',top:to.t+'px'}],
    {duration:MOVE_MS, easing:'cubic-bezier(.2,.9,.2,1)', fill:'forwards'}
  );
  await a.finished.catch(()=>{});
  s.style.left=to.l+'px'; s.style.top=to.t+'px';
  s.classList.remove('moving');
  pos={x:tx,y:ty}; animating=false;
}

// ═══ SPRITE DRAG ═══
function setupSpriteDrag() {
  const s = document.getElementById('sprite');
  function start(cx,cy) {
    if(running||animating) return false;
    const g = document.getElementById('ghost');
    const w = s.offsetWidth;
    g.innerHTML = svgRobot(ori);
    g.style.cssText = `display:block;width:${w}px;height:${w}px;left:${cx}px;top:${cy}px;`;
    s.style.opacity = '0.3'; return true;
  }
  function move(cx,cy) {
    const g = document.getElementById('ghost');
    g.style.left=cx+'px'; g.style.top=cy+'px';
    g.style.display='none';
    const u = document.elementFromPoint(cx,cy);
    g.style.display='block';
    document.querySelectorAll('.cell.hi').forEach(c=>c.classList.remove('hi'));
    u?.closest('.cell')?.classList.add('hi');
  }
  async function end(cx,cy) {
    document.getElementById('ghost').style.display='none';
    s.style.opacity='1';
    document.querySelectorAll('.cell.hi').forEach(c=>c.classList.remove('hi'));
    const u = document.elementFromPoint(cx,cy);
    const cell = u?.closest('.cell');
    if(cell) await animTo(+cell.dataset.cx, +cell.dataset.cy);
    syncSprite();
  }
  s.addEventListener('touchstart',e=>{
    e.preventDefault(); e.stopPropagation();
    const t=e.touches[0]; if(!start(t.clientX,t.clientY)) return;
    const mm=e=>{e.preventDefault();move(e.touches[0].clientX,e.touches[0].clientY);};
    const mu=e=>{e.preventDefault();end(e.changedTouches[0].clientX,e.changedTouches[0].clientY);s.removeEventListener('touchmove',mm);s.removeEventListener('touchend',mu);};
    s.addEventListener('touchmove',mm,{passive:false});
    s.addEventListener('touchend',mu,{passive:false});
  },{passive:false});
  s.addEventListener('mousedown',e=>{
    e.preventDefault(); if(!start(e.clientX,e.clientY)) return;
    const mm=e=>move(e.clientX,e.clientY);
    const mu=e=>{end(e.clientX,e.clientY);document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });
}

// ═══ PROCEDURAL BACKGROUND ═══
function drawBackground() {
  const canvas = document.getElementById('bgCanvas');
  const grid   = document.getElementById('gameGrid');
  if (!canvas || !grid) return;
  const rect = grid.getBoundingClientRect();
  const wrap = document.getElementById('gridWrap').getBoundingClientRect();
  const S = Math.round(rect.width);
  if (!S) return;
  canvas.width  = S;
  canvas.height = S;
  canvas.style.left   = (rect.left - wrap.left) + 'px';
  canvas.style.top    = (rect.top  - wrap.top)  + 'px';
  canvas.style.width  = S + 'px';
  canvas.style.height = S + 'px';
  const cx = canvas.getContext('2d');

  // ── SFONDO: pavimento in legno chiaro ──
  const bg = cx.createLinearGradient(0, 0, 0, S);
  bg.addColorStop(0, '#fff8ee');
  bg.addColorStop(1, '#fde8c4');
  cx.fillStyle = bg;
  cx.fillRect(0, 0, S, S);

  // venatura legno
  cx.save();
  cx.globalAlpha = 0.045;
  cx.strokeStyle = '#b07830';
  for(let i = 0; i < 9; i++) {
    const y = S * i / 8;
    cx.lineWidth = S * 0.008;
    cx.beginPath();
    cx.moveTo(0, y + Math.sin(i*1.3)*S*0.03);
    cx.bezierCurveTo(S*0.3, y - S*0.02, S*0.6, y + S*0.03, S, y + Math.sin(i*0.9)*S*0.02);
    cx.stroke();
  }
  cx.restore();

  // ── MATTONCINI SPARSI SUL PAVIMENTO ──
  // Helper: disegna un mattone BÖKS con effetto 3D
  function brick(bx, by, w, h, col, studs=2, alpha=1) {
    const dark = col.replace('rgb','rgba').replace(')',`,${alpha*0.7})`);
    cx.save(); cx.globalAlpha = alpha;
    // ombra
    cx.fillStyle = 'rgba(0,0,0,0.12)';
    cx.beginPath(); cx.roundRect(bx+3, by+4, w, h, 5); cx.fill();
    // lato destro (3D)
    cx.fillStyle = shadeColor(col, -25);
    cx.beginPath();
    cx.moveTo(bx+w, by); cx.lineTo(bx+w+6, by-4);
    cx.lineTo(bx+w+6, by+h-4); cx.lineTo(bx+w, by+h);
    cx.closePath(); cx.fill();
    // lato superiore (3D)
    cx.fillStyle = shadeColor(col, 20);
    cx.beginPath();
    cx.moveTo(bx, by); cx.lineTo(bx+6, by-4);
    cx.lineTo(bx+w+6, by-4); cx.lineTo(bx+w, by);
    cx.closePath(); cx.fill();
    // faccia frontale
    cx.fillStyle = col;
    cx.beginPath(); cx.roundRect(bx, by, w, h, 5); cx.fill();
    // highlight
    cx.fillStyle = 'rgba(255,255,255,0.22)';
    cx.beginPath(); cx.roundRect(bx+3, by+3, w-6, h*0.38, 4); cx.fill();
    // bordo
    cx.strokeStyle = 'rgba(0,0,0,0.1)'; cx.lineWidth = 1;
    cx.beginPath(); cx.roundRect(bx, by, w, h, 5); cx.stroke();
    // studi (dischetti sopra)
    const sw = w/studs;
    for(let s=0; s<studs; s++) {
      const sx = bx + sw*(s+0.5), sy = by - 7;
      // cilindretto 3D
      cx.fillStyle = shadeColor(col, -10);
      cx.beginPath(); cx.ellipse(sx, sy+3, sw*0.26, 4, 0, 0, Math.PI*2); cx.fill();
      cx.fillStyle = col;
      cx.beginPath(); cx.ellipse(sx, sy, sw*0.26, 4, 0, 0, Math.PI*2); cx.fill();
      cx.fillStyle = 'rgba(255,255,255,0.18)';
      cx.beginPath(); cx.ellipse(sx-1, sy-1.5, sw*0.11, 2, 0, 0, Math.PI*2); cx.fill();
      cx.strokeStyle='rgba(0,0,0,0.08)'; cx.lineWidth=0.8;
      cx.beginPath(); cx.ellipse(sx, sy, sw*0.26, 4, 0, 0, Math.PI*2); cx.stroke();
    }
    cx.restore();
  }

  function shadeColor(hex, pct) {
    // semplice schiarisci/scurisci
    const n = parseInt(hex.replace('#',''), 16);
    const r = Math.min(255, Math.max(0, (n>>16) + pct*2));
    const g = Math.min(255, Math.max(0, ((n>>8)&0xff) + pct*2));
    const b = Math.min(255, Math.max(0, (n&0xff) + pct*2));
    return `rgb(${r},${g},${b})`;
  }

  // Torre mattoncini — angolo in basso a destra
  brick(S*0.60, S*0.80, S*0.33, S*0.09, '#E8302A', 3, 0.75);
  brick(S*0.63, S*0.70, S*0.27, S*0.09, '#F5C400', 2, 0.75);
  brick(S*0.66, S*0.60, S*0.20, S*0.09, '#2B8FD4', 2, 0.7);
  brick(S*0.68, S*0.50, S*0.14, S*0.09, '#4CAF3F', 1, 0.65);

  // Mattoncini sparsi — angolo in basso a sinistra
  brick(S*0.03, S*0.76, S*0.22, S*0.09, '#F47E20', 2, 0.65);
  brick(S*0.05, S*0.65, S*0.16, S*0.09, '#3DC4C0', 1, 0.6);

  // Mattoncini isolati in giro
  brick(S*0.06, S*0.12, S*0.18, S*0.08, '#2B8FD4', 1, 0.55);
  brick(S*0.70, S*0.08, S*0.20, S*0.08, '#E8302A', 2, 0.55);
  brick(S*0.35, S*0.84, S*0.16, S*0.08, '#4CAF3F', 1, 0.55);
  brick(S*0.44, S*0.06, S*0.16, S*0.08, '#F5C400', 1, 0.5);

  // ── GRIGLIA sottile (linee pavimento) ──
  cx.save();
  cx.globalAlpha = 0.055;
  cx.strokeStyle = '#b07830'; cx.lineWidth = 1;
  const csz = S/6;
  for(let i=1;i<6;i++){
    cx.beginPath(); cx.moveTo(i*csz,0); cx.lineTo(i*csz,S); cx.stroke();
    cx.beginPath(); cx.moveTo(0,i*csz); cx.lineTo(S,i*csz); cx.stroke();
  }
  cx.restore();
}

// ═══ RENDER BOARD ═══
// Block/slot sizes computed dynamically in renderBoard
const BSIZ = 28; // fallback
const SLOT_H = 38; // fallback

function getBoardSizes() {
  const board = document.getElementById('boardRow');
  const app   = document.getElementById('app');
  const boardW = board.clientWidth || (app.clientWidth - 20);
  const innerW = boardW - 16;
  const slotW  = Math.floor((innerW - 3 * 5) / 4);
  const slotH  = Math.max(42, Math.min(slotW, 58));
  const bsiz   = Math.max(28, slotH - 10);
  return { slotH, slotW, bsiz, innerW };
}

function renderBoard() {
  const g = document.getElementById('boardGrid');
  g.innerHTML = '';
  const { slotH, bsiz, innerW } = getBoardSizes();

  const gapH = 22;
  const totalH = 3 * slotH + 2 * gapH;

  // SVG per il connettore tra riga1 e riga2
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('id','boardTrack');
  svg.setAttribute('viewBox',`0 0 ${innerW} ${totalH}`);
  svg.setAttribute('preserveAspectRatio','none');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;z-index:0;';
  g.style.position = 'relative';
  g.appendChild(svg);

  const slotsWrap = document.createElement('div');
  slotsWrap.id = 'boardSlots';
  slotsWrap.style.position = 'relative';
  slotsWrap.style.zIndex = '1';
  g.style.height = totalH + 'px';

  const rowDefs = [
    { idxs:[0,1,2,3], reverse:false, zone:'main' },
    { idxs:[4,5,6,7], reverse:false, zone:'main' },
    { idxs:[0,1,2,3], reverse:false, zone:'fn'   },
  ];

  rowDefs.forEach(({ idxs, reverse, zone }, rowIdx) => {
    const rowEl = document.createElement('div');
    rowEl.className = 'board-row' + (reverse ? ' reverse' : '');
    rowEl.style.cssText = `height:${slotH}px; gap:5px; padding:0 2px;`;
    if(rowIdx > 0) rowEl.style.marginTop = gapH + 'px';

    idxs.forEach(i => {
      const arr = zone === 'fn' ? fnProg : prog;
      const slot = document.createElement('div');
      slot.className = 'pslot';
      slot.dataset.slot = i; slot.dataset.zone = zone;
      slot.style.height = slotH + 'px';

      const inn = document.createElement('div');
      inn.className = 'sinner';
      inn.style.cssText = `width:100%;height:${bsiz}px;`;

      if(arr[i]) {
        const be = mkB(arr[i], bsiz, bsiz, 'pblock');
        be.dataset.si = i; be.dataset.zone = zone;
        bindDrag(be, zone === 'fn' ? 'fn' : 'prog', i, bsiz);
        inn.appendChild(be);
      }
      const dot = document.createElement('div'); dot.className = 'dot';
      const arrow = document.createElement('div');
      arrow.className = 'slot-arrow'; arrow.textContent = '→';
      slot.appendChild(inn); slot.appendChild(dot);
      if(!arr[i]) slot.appendChild(arrow);
      rowEl.appendChild(slot);
    });
    slotsWrap.appendChild(rowEl);
  });

  g.appendChild(slotsWrap);

  // Traccia completa: riga1 → connettore → riga2
  requestAnimationFrame(() => {
    const y1  = slotH / 2;
    const yM  = slotH + gapH / 2;
    const y2  = slotH + gapH + slotH / 2;
    const r   = gapH * 0.9;

    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',
      `M 0 ${y1}` +
      ` H ${innerW}` +
      ` L ${innerW} ${yM - r}` +
      ` Q ${innerW} ${yM} ${innerW - r} ${yM}` +
      ` L ${r} ${yM}` +
      ` Q 0 ${yM} 0 ${yM + r}` +
      ` L 0 ${y2}` +
      ` H ${innerW}`
    );
    p.setAttribute('fill', 'none');
    p.setAttribute('stroke', 'rgba(180,140,80,0.35)');
    p.setAttribute('stroke-width', '3');
    p.setAttribute('stroke-linecap', 'round');
    p.setAttribute('stroke-linejoin', 'round');
    svg.appendChild(p);

    // Freccia inizio traccia main (sinistra riga1)
    const as = slotH * 0.28;
    function arrow(x, y, color) {
      const a = document.createElementNS('http://www.w3.org/2000/svg','path');
      a.setAttribute('d', `M ${x} ${y - as} Q ${x + as*0.3} ${y - as} ${x + as} ${y} Q ${x + as*0.3} ${y + as} ${x} ${y + as} Q ${x + as*0.5} ${y} ${x} ${y - as}`);
      a.setAttribute('fill', color);
      a.setAttribute('stroke', 'none');
      svg.appendChild(a);
    }
    arrow(2, y1, 'rgba(180,140,80,0.5)');

    // Traccia riga fn
    const y3 = 2 * (slotH + gapH) + slotH / 2;
    const pFn = document.createElementNS('http://www.w3.org/2000/svg','path');
    pFn.setAttribute('d', `M 0 ${y3} H ${innerW}`);
    pFn.setAttribute('fill', 'none');
    pFn.setAttribute('stroke', 'rgba(124,58,237,0.3)');
    pFn.setAttribute('stroke-width', '3');
    pFn.setAttribute('stroke-linecap', 'round');
    svg.appendChild(pFn);

    // Freccia inizio traccia fn
    arrow(2, y3, 'rgba(124,58,237,0.45)');
    const ySep = 2 * slotH + 2 * gapH - gapH / 2;
    const sep = document.createElementNS('http://www.w3.org/2000/svg','line');
    sep.setAttribute('x1', '0'); sep.setAttribute('x2', innerW);
    sep.setAttribute('y1', ySep); sep.setAttribute('y2', ySep);
    sep.setAttribute('stroke', 'rgba(124,58,237,0.25)');
    sep.setAttribute('stroke-width', '1.5');
    sep.setAttribute('stroke-dasharray', '5 4');
    svg.appendChild(sep);
  });
}

// Legacy hook: board rendering is centralized in renderBoard().
function renderFn() {}

function drawTrack(svg, slotH, gapH, totalH, W, mainActive, fnActive) {
  svg.innerHTML = '';
  const pad = 8;
  const cR = gapH / 2 + 2;

  const y1 = slotH / 2;
  const y2 = slotH + gapH + slotH / 2;
  const y3 = 2 * (slotH + gapH) + slotH / 2;

  const defs = document.createElementNS('http://www.w3.org/2000/svg','defs');
  defs.innerHTML = `
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glowFn"><feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>`;
  svg.appendChild(defs);

  function path(d, lit, violet) {
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d', d); p.setAttribute('fill','none');
    p.setAttribute('stroke', lit ? (violet ? 'rgba(124,58,237,0.75)' : 'rgba(60,210,160,0.7)') : (violet ? 'rgba(124,58,237,0.18)' : 'rgba(180,140,80,0.18)'));
    p.setAttribute('stroke-width','2'); p.setAttribute('stroke-linecap','round');
    if(lit) p.setAttribute('filter', violet ? 'url(#glowFn)' : 'url(#glow)');
    return p;
  }

  const m = mainActive; // active main slot index
  const f = fnActive;   // active fn slot index

  // ── main row 1 (→) ──
  svg.appendChild(path(`M ${pad} ${y1} H ${W-pad}`, m > 0, false));

  // ── main row 2 (→) ──
  svg.appendChild(path(`M ${pad} ${y2} H ${W-pad}`, m >= 4, false));

  // ── divisore sottile tra main e fn ──
  const ydiv = y2 + (y3 - y2) / 2;
  const divLine = document.createElementNS('http://www.w3.org/2000/svg','line');
  divLine.setAttribute('x1', '0'); divLine.setAttribute('x2', W);
  divLine.setAttribute('y1', ydiv); divLine.setAttribute('y2', ydiv);
  divLine.setAttribute('stroke', 'rgba(124,58,237,0.2)');
  divLine.setAttribute('stroke-width', '1.5');
  divLine.setAttribute('stroke-dasharray', '4 4');
  svg.appendChild(divLine);

  // ── fn row (→) ──
  svg.appendChild(path(`M ${pad} ${y3} H ${W-pad}`, f >= 0, true));
}

// ═══ DRAG ═══
let dg = {active:false, block:null, src:null, si:null, hover:null};

function bindDrag(el, src, idx, sz) {
  el.addEventListener('touchstart',e=>{
    if(running) return; e.preventDefault(); e.stopPropagation();
    startDg(e.touches[0].clientX,e.touches[0].clientY,src,idx,sz);
  },{passive:false});
  el.addEventListener('touchmove', e=>{e.preventDefault();moveDg(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();endDg(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:false});
  el.addEventListener('mousedown',e=>{
    if(running) return; e.preventDefault();
    startDg(e.clientX,e.clientY,src,idx,sz);
    const mm=e=>moveDg(e.clientX,e.clientY);
    const mu=e=>{endDg(e.clientX,e.clientY);document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);
    document.addEventListener('mouseup',mu);
  });
}

function startDg(cx,cy,src,idx,sz) {
  const block = src==='avail' ? avail[idx] : src==='fn' ? fnProg[idx] : prog[idx];
  if(!block) return;
  dg = {active:true, block, src, si:idx, hover:null};
  const g = document.getElementById('ghost');
  g.innerHTML=''; g.appendChild(mkB(block,sz,sz));
  g.style.cssText=`display:block;width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;border-radius:5px;`;
  if(src==='avail') {
    document.querySelectorAll('.ablock').forEach(el=>{ if(+el.dataset.ai===idx) el.style.opacity='0.3'; });
  } else {
    const zone = src==='fn' ? 'fn' : 'main';
    const s=document.querySelector(`.pslot[data-zone="${zone}"][data-slot="${idx}"] .sinner`);
    if(s) s.style.opacity='0.3';
  }
}

function moveDg(cx,cy) {
  if(!dg.active) return;
  const g = document.getElementById('ghost');
  g.style.left=cx+'px'; g.style.top=cy+'px';
  g.style.display='none';
  const u=document.elementFromPoint(cx,cy);
  g.style.display='block';
  const slot=u?.closest('.pslot');
  if(dg.hover&&dg.hover!==slot) dg.hover.classList.remove('over');
  if(slot){slot.classList.add('over');dg.hover=slot;} else dg.hover=null;
}

function endDg(cx,cy) {
  if(!dg.active) return;
  document.getElementById('ghost').style.display='none';
  if(dg.hover) dg.hover.classList.remove('over');
  document.querySelectorAll('.ablock,.pblock').forEach(e=>e.style.opacity='1');
  document.querySelectorAll('.sinner').forEach(e=>e.style.opacity='1');
  const u=document.elementFromPoint(cx,cy);
  const slot=u?.closest('.pslot');
  if(slot) {
    const ti = +slot.dataset.slot;
    const zone = slot.dataset.zone;
    if(zone === 'fn') {
      // blocchi function non possono stare nella fn zone
      if(dg.block.dir === 'function') { dg.active=false; renderAvail(); renderBoard(); renderFn(); return; }
      if(dg.src==='avail') fnProg[ti]={id:`${dg.block.dir}${idN++}`,...POOL[dg.block.dir]};
      else if(dg.src==='fn'&&dg.si!==ti){ const tmp=fnProg[ti];fnProg[ti]=dg.block;fnProg[dg.si]=tmp; }
      else if(dg.src==='prog'){ fnProg[ti]={...dg.block}; prog[dg.si]=null; }
    } else {
      if(dg.src==='avail') prog[ti]={id:`${dg.block.dir}${idN++}`,...POOL[dg.block.dir]};
      else if(dg.src==='prog'&&dg.si!==ti){ const tmp=prog[ti];prog[ti]=dg.block;prog[dg.si]=tmp; }
      else if(dg.src==='fn'){ prog[ti]={...dg.block}; fnProg[dg.si]=null; }
    }
  } else {
    if(dg.src==='prog') prog[dg.si]=null;
    else if(dg.src==='fn') fnProg[dg.si]=null;
  }
  dg.active=false;
  renderAvail(); renderBoard(); renderFn();
}

// ═══ GAME LOGIC ═══
function hlSlot(i, zone='main') {
  if(zone === 'main') {
    document.querySelectorAll('.pslot[data-zone="main"]').forEach(s => s.classList.remove('active','done'));
    for(let j = 0; j < i; j++)
      document.querySelector(`.pslot[data-zone="main"][data-slot="${j}"]`)?.classList.add('done');
    document.querySelector(`.pslot[data-zone="main"][data-slot="${i}"]`)?.classList.add('active');
  } else {
    document.querySelectorAll('.pslot[data-zone="fn"]').forEach(s => s.classList.remove('fn-active','fn-done'));
    for(let j = 0; j < i; j++)
      document.querySelector(`.pslot[data-zone="fn"][data-slot="${j}"]`)?.classList.add('fn-done');
    document.querySelector(`.pslot[data-zone="fn"][data-slot="${i}"]`)?.classList.add('fn-active');
  }
  // no SVG track to redraw
}
async function moveChar(dir) {
  if(dir==='forward') {
    const p={...pos};
    if(ori==='up')        p.y=Math.max(0,p.y-1);
    else if(ori==='down') p.y=Math.min(ROWS-1,p.y+1);
    else if(ori==='left') p.x=Math.max(0,p.x-1);
    else                   p.x=Math.min(COLS-1,p.x+1);
    await animTo(p.x,p.y); await sleep(80);
  } else {
    const newOri = dir==='left'
      ? {up:'left',left:'down',down:'right',right:'up'}[ori]
      : {up:'right',right:'down',down:'left',left:'up'}[ori];
    const deg = dir==='left' ? -90 : 90;
    const s = document.getElementById('sprite');
    // animate rotation
    const anim = s.animate(
      [{transform:'rotate(0deg)'},{transform:`rotate(${deg}deg)`}],
      {duration: TURN_MS, easing:'cubic-bezier(0.4,0,0.2,1)', fill:'forwards'}
    );
    await anim.finished.catch(()=>{});
    anim.cancel(); // reset transform so syncSprite takes over
    ori = newOri;
    syncSprite();
  }
}
async function run() {
  if(running||animating) return;
  requestAppFullscreen();
  let last=-1;
  for(let i=0;i<SLOTS;i++) if(prog[i]) last=i;
  if(last===-1){sErr();return;}
  running=true;
  const btn=document.getElementById('runBtn');
  btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="5" y="4" width="4" height="16" rx="1" fill="#111111"/><rect x="15" y="4" width="4" height="16" rx="1" fill="#111111"/></svg>';
  toast(''); await sleep(200);
  let won = false;

  for(let i=0;i<=last;i++) {
    hlSlot(i, 'main'); await sleep(STEP_MS);
    if(prog[i]) {
      if(prog[i].dir === 'function') {
        // ── esegui sub-routine ──
        let fnLast = -1;
        for(let f=0;f<FSLOTS;f++) if(fnProg[f]) fnLast=f;
        if(fnLast === -1) { sErr(); await sleep(300); }
        else {
          for(let f=0;f<=fnLast;f++) {
            hlSlot(f, 'fn'); await sleep(STEP_MS);
            if(fnProg[f]) {
              sStep();
              await moveChar(fnProg[f].dir||fnProg[f].direction); await sleep(STEP_MS);
              if(pos.x===GOAL.x&&pos.y===GOAL.y) { won=true; break; }
            }
          }
          document.querySelectorAll('.pslot[data-zone="fn"]').forEach(s=>s.classList.remove('fn-active','fn-done'));
          if(won) break;
        }
      } else {
        sStep();
        await moveChar(prog[i].dir||prog[i].direction); await sleep(STEP_MS);
        if(pos.x===GOAL.x&&pos.y===GOAL.y) { won=true; break; }
      }
    } else { await sleep(STEP_MS); }
  }

  document.querySelectorAll('.pslot[data-zone="main"]').forEach(s=>s.classList.remove('active','done'));
  document.querySelectorAll('.pslot[data-zone="fn"]').forEach(s=>s.classList.remove('fn-active','fn-done'));
  btn.classList.remove('running'); btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><polygon points="7,4 21,12 7,20" fill="#111111"/></svg>'; running=false;

  if(won) {
    sWin();
    await sleep(1200);
    for(let j=0;j<SLOTS;j++) prog[j]=null;
    for(let j=0;j<FSLOTS;j++) fnProg[j]=null;
    renderBoard(); renderFn();
    moveGoal();
  } else {
    await sleep(400);
    renderBoard(); renderFn();
  }
}

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', async () => {
      try {
        const reg = await navigator.serviceWorker.register('service-worker.js', {
          updateViaCache: 'none'
        });

        // Force periodic update checks while testing packaged app builds.
        reg.update();
        setInterval(() => reg.update(), 30000);

        if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
        reg.addEventListener('updatefound', () => {
          const worker = reg.installing;
          if (!worker) return;
          worker.addEventListener('statechange', () => {
            if (worker.state === 'installed' && navigator.serviceWorker.controller) {
              worker.postMessage({ type: 'SKIP_WAITING' });
            }
          });
        });

        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      } catch (err) {
        console.error('Service worker registration failed:', err);
      }
    });
  }
</script>
