<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#000000"/>
  <title>BÖKS</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;700&family=Lilita+One&display=swap" rel="stylesheet">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/boks-apple-touch-icon.png">
  <link rel="stylesheet" href="styles/app.css">
  <link rel="stylesheet" href="styles/character.css">
</head>
<body
  class="prestart"
  data-build="20260323-112456"
  data-release-channel="main"
  data-editor-enabled="true"
  data-debug-tools-enabled="true"
  data-build-badge-enabled="true"
>

<!-- Splash screen -->
<div id="splash">
  <div id="splash-logo">
    <span style="color:#3F9A62;text-shadow:0 5px 0 #2b6f46;">B</span><span style="color:#FF3B3B;text-shadow:0 5px 0 #a81f1f;">Ö</span><span style="color:#FFD31A;text-shadow:0 5px 0 #b18400;">K</span><span style="color:#2B8FD4;text-shadow:0 5px 0 #1a5a8a;">S</span>
  </div>
  <div class="splash-stage">
    <div class="splash-track" aria-hidden="true">
      <span class="splash-chip splash-chip-forward"></span>
      <span class="splash-chip splash-chip-left"></span>
      <span class="splash-chip splash-chip-right"></span>
      <span class="splash-chip splash-chip-function"></span>
    </div>
    <p class="splash-kicker">Prepariamo il percorso</p>
    <div class="splash-loader" aria-hidden="true"><span></span></div>
  </div>
</div>
<div id="rotateNotice" role="status" aria-live="polite">
  <div class="rotate-card">
    <h2>Ruota il dispositivo</h2>
    <p>Per giocare al meglio, usa la modalita portrait.</p>
  </div>
</div>
<div id="startGate" aria-label="Menu iniziale">
  <div class="start-title">
    <span style="color:#3F9A62;text-shadow:0 5px 0 #2b6f46;">B</span><span style="color:#FF3B3B;text-shadow:0 5px 0 #a81f1f;">Ö</span><span style="color:#FFD31A;text-shadow:0 5px 0 #b18400;">K</span><span style="color:#2B8FD4;text-shadow:0 5px 0 #1a5a8a;">S</span>
  </div>
  <div class="start-actions">
    <button id="startGameBtn" type="button" aria-label="Play">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M12 12 L12 7.5 A4.5 4.5 0 0 1 16.5 12 Z" fill="#2B8FD4"/>
        <path d="M12 12 L16.5 12 A4.5 4.5 0 0 1 12 16.5 Z" fill="#FFD31A"/>
        <path d="M12 12 L12 16.5 A4.5 4.5 0 0 1 7.5 12 Z" fill="#FF3B3B"/>
        <path d="M12 12 L7.5 12 A4.5 4.5 0 0 1 12 7.5 Z" fill="#3F9A62"/>
      </svg>
    </button>
    <button id="startEditorBtn" type="button">Level Editor</button>
  </div>
</div>
<button id="quickEditorBtn" type="button" aria-label="Apri editor con il livello corrente">Editor</button>
  <div id="app">
    <div id="editorLayout">
      <div id="editorSide">
        <div id="editorToolbar" aria-label="Level editor controls">
          <button id="saveLevelBtn" type="button">Salva</button>
          <button id="exitEditorBtn" type="button" aria-label="Torna al gioco">Torna al gioco</button>
        </div>
        <div id="customLevelsPanel" aria-label="I miei livelli">
          <div class="custom-levels-head">
            <h3>Livelli</h3>
          </div>
          <div id="customLevelsList"></div>
        </div>
        <div id="elementPalettePanel" aria-label="Elementi del livello">
          <div class="custom-levels-head">
            <h3>Elementi</h3>
          </div>
          <div id="elementPalette"></div>
        </div>
      </div>
      <div id="editorMain">
        <!-- BÖKS header -->
        <div id="header">
          <span class="logo-letter logo-b">B</span><span class="logo-letter logo-o">Ö</span><span class="logo-letter logo-k">K</span><span class="logo-letter logo-s">S</span>
        </div>
        <!-- Row 1: grid (flexible) -->
        <div id="gridWrap">
          <canvas id="bgCanvas" style="position:absolute;inset:0;pointer-events:none;border-radius:7px;"></canvas>
          <div id="gameGrid"></div>
          <div id="sprite"></div>
        </div>

        <!-- Row 2: fixed bottom section -->
        <div id="bottom">
          <div id="blocksRow"></div>
          <div id="boardRow"><div id="boardGrid"></div></div>
          <button id="runBtn" onclick="run()" onmousedown="this.blur()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M12 12 L12 7.5 A4.5 4.5 0 0 1 16.5 12 Z" fill="#2B8FD4"/>
              <path d="M12 12 L16.5 12 A4.5 4.5 0 0 1 12 16.5 Z" fill="#FFD31A"/>
              <path d="M12 12 L12 16.5 A4.5 4.5 0 0 1 7.5 12 Z" fill="#FF3B3B"/>
              <path d="M12 12 L7.5 12 A4.5 4.5 0 0 1 12 7.5 Z" fill="#3F9A62"/>
            </svg>
          </button>
        </div>
      </div>
    </div>
</div>
<div id="ghost"></div>
<div id="toast"></div>
<div id="levelFade"></div>
<div id="buildBadge" aria-label="Build version"></div>
<div id="saveLevelModal" aria-hidden="true">
  <div class="save-level-card" role="dialog" aria-modal="true" aria-labelledby="saveLevelTitle">
    <h2 id="saveLevelTitle">Salva livello</h2>
    <label class="save-field" for="levelNameInput">
      <span>Nome</span>
      <input id="levelNameInput" type="text" maxlength="32" placeholder="Es. Giro Corto">
    </label>
    <div class="save-field">
      <span>Icona</span>
      <div id="iconPicker"></div>
    </div>
    <div class="save-actions">
      <button id="cancelSaveLevelBtn" type="button">Annulla</button>
      <button id="confirmSaveLevelBtn" type="button">Salva livello</button>
    </div>
  </div>
</div>

  <script src="js/core/app-loader.js"></script>
</body>
</html>
