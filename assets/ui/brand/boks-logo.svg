<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 130" role="img" aria-label="BOKS">
  <defs>
    <style>
      @font-face {
        font-family: "BoksLogoLilita";
        src: url("../../fonts/LilitaOne-Regular.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
      }
      .letter {
        font-family: "BoksLogoLilita", "Arial Black", sans-serif;
        font-size: 116px;
        font-weight: 400;
        dominant-baseline: middle;
        text-anchor: middle;
      }
    </style>
    <filter id="soft-shadow" x="-10%" y="-15%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="2.3" flood-color="#5f4e34" flood-opacity="0.16"/>
    </filter>
  </defs>
  <g filter="url(#soft-shadow)">
    <text class="letter" x="54" y="69" fill="#3F9A62">B</text>
    <text class="letter" x="158" y="69" fill="#FF3B3B">&#214;</text>
    <text class="letter" x="266" y="69" fill="#FFD31A">K</text>
    <text class="letter" x="372" y="69" fill="#2B8FD4">S</text>
  </g>
</svg>
